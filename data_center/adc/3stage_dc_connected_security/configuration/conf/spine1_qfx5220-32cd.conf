policy-options {
    prefix-list bgp-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list ntp-sources {
        10.0.0.0/8;
        66.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list snmp-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list ssh-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    route-filter-list RoutesFromExt-default-external_fwall {
        0.0.0.0/0 exact;
        192.168.250.1/32 exact;
        192.168.250.2/32 exact;
    }
    route-filter-list RoutesToExt-default-external_fwall {
        192.168.255.5/32 exact;
        192.168.255.6/31 upto /32;
        192.168.255.8/30 upto /32;
    }
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V6;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from policy AllPodNetworks;
            then accept;
        }
        term BGP-AOS-Policy-20 {
            from protocol bgp;
            then accept;
        }
        term BGP-AOS-Policy-100 {
            then reject;
        }
    }
    policy-statement EVPN_GW_IN_TYPE5 {
        term EVPN_GW_IN_TYPE5-10 {
            from {
                family evpn;
                nlri-route-type 5;
            }
            then {
                community add EVPN_GW_IN;
                accept;
            }
        }
        term EVPN_GW_IN_TYPE5-20 {
            from family evpn;
            then reject;
        }
    }
    policy-statement EVPN_GW_OUT_TYPE5 {
        term EVPN_GW_OUT_TYPE5-10 {
            from {
                family evpn;
                community EVPN_GW_OUT;
            }
            then reject;
        }
        term EVPN_GW_OUT_TYPE5-20 {
            from {
                family evpn;
                nlri-route-type 5;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                accept;
            }
        }
        term EVPN_GW_OUT_TYPE5-30 {
            from family evpn;
            then reject;
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
    policy-statement RoutesFromExt-default-external_fwall {
        term RoutesFromExt-default-external_fwall-10 {
            from {
                family inet;
                route-filter-list RoutesFromExt-default-external_fwall;
            }
            then {
                community add RoutesFromExt-default-external_fwall;
                accept;
            }
        }
        term RoutesFromExt-default-external_fwall-30 {
            from family inet;
            then reject;
        }
    }
    policy-statement RoutesToExt-default-external_fwall {
        term RoutesToExt-default-external_fwall-10 {
            from {
                family inet;
                route-filter-list RoutesToExt-default-external_fwall;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                next-hop self;
                accept;
            }
        }
        term RoutesToExt-default-external_fwall-30 {
            from family inet;
            then reject;
        }
    }
    policy-statement SPINE_TO_LEAF_EVPN_OUT {
        term SPINE_TO_LEAF_EVPN_OUT-10 {
            then {
                community add FROM_SPINE_EVPN_TIER;
                accept;
            }
        }
    }
    policy-statement SPINE_TO_LEAF_FABRIC_OUT {
        term SPINE_TO_LEAF_FABRIC_OUT-10 {
            then {
                community add FROM_SPINE_FABRIC_TIER;
                accept;
            }
        }
    }
    community DEFAULT_DIRECT_V4 members [ 1:20007 21001:26000 ];
    community DEFAULT_DIRECT_V6 members [ 1:20008 21001:26000 ];
    community EVPN_GW_IN members [ 1:20001 21000:26000 ];
    community EVPN_GW_OUT members .+:20001;
    community FABRIC_COMMUNITIES members [ 0:12 0:13 0:14 0:15 .+:200.. 2....:260.. ];
    community FROM_SPINE_EVPN_TIER members 0:14;
    community FROM_SPINE_FABRIC_TIER members 0:15;
    community RoutesFromExt-default-external_fwall members [ 1:20009 21001:26000 ];
    community RoutesFromExtV6-default-external_fwall members [ 1:20010 21001:26000 ];
}
firewall {
    family inet {
        filter cpp-filter-v1 {
            term ssh {
                from {
                    source-prefix-list {
                        ssh-sources;
                    }
                    protocol tcp;
                    destination-port ssh;
                }
                then {
                    count cpp-ssh-accept;
                    accept;
                }
            }
            term icmp {
                from {
                    protocol icmp;
                    icmp-type [ echo-request echo-reply unreachable time-exceeded ];
                }
                then {
                    policer police-5mbps;
                    count cpp-icmp-accept;
                    accept;
                }
            }
            term dns-req {
                from {
                    protocol udp;
                    destination-port 53;
                }
                then {
                    count cpp-dns-req-accept;
                    accept;
                }
            }
            term dns-rep {
                from {
                    protocol udp;
                    source-port 53;
                }
                then {
                    count cpp-dns-rep-accept;
                    accept;
                }
            }
            term ntp-rep {
                from {
                    source-prefix-list {
                        ntp-sources;
                    }
                    protocol udp;
                    source-port ntp;
                }
                then {
                    count cpp-ntp-rep-accept;
                    accept;
                }
            }
            term ntp-req {
                from {
                    protocol udp;
                    destination-port ntp;
                }
                then {
                    count cpp-ntp-req-accept;
                    accept;
                }
            }
            term dhcp-to-client {
                from {
                    protocol udp;
                    destination-port 68;
                }
                then {
                    count cpp-dhcp-to-client-accept;
                    accept;
                }
            }
            term dhcp-from-server {
                from {
                    protocol udp;
                    source-port 67;
                }
                then {
                    count cpp-dhcp-from-server-accept;
                    accept;
                }
            }
            term netconf {
                from {
                    source-prefix-list {
                        ssh-sources;
                    }
                    protocol tcp;
                    destination-port 830;
                }
                then {
                    count cpp-netconf-accept;
                    accept;
                }
            }
            term bfd {
                from {
                    protocol udp;
                    destination-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-accept;
                    accept;
                }
            }
            term bfd-rep {
                from {
                    protocol udp;
                    source-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-rep-accept;
                    accept;
                }
            }
            term bgp {
                from {
                    source-prefix-list {
                        bgp-sources;
                    }
                    protocol tcp;
                    destination-port 179;
                }
                then {
                    count bgp-accept;
                    accept;
                }
            }
            term snmp {
                from {
                    source-prefix-list {
                        snmp-sources;
                    }
                    protocol udp;
                    destination-port snmp;
                }
                then {
                    count cpp-snmp-accept;
                    accept;
                }
            }
            term ospf {
                from {
                    protocol ospf;
                }
                then {
                    count cpp-ospf-accept;
                    accept;
                }
            }
            term fetch {
                from {
                    protocol tcp;
                    destination-port 8080;
                }
                then {
                    count cpp-fetch-accept;
                    accept;
                }
            }
            term openssl {
                from {
                    protocol tcp;
                    destination-port 32767;
                }
                then {
                    count cpp-openssl-accept;
                    accept;
                }
            }
            term tcp-established {
                from {
                    protocol tcp;
                    tcp-established;
                }
                then {
                    count cpp-tcp-established-accept;
                    accept;
                }
            }
            term discard-rest {
                then {
                    count cpp-discard-rest;
                    discard;
                }
            }
        }
    }
    family inet6 {
        filter cpp-filter-v1-ipv6 {
            term ssh {
                from {
                    next-header tcp;
                    destination-port ssh;
                }
                then {
                    count cpp-ssh-accept-v6;
                    accept;
                }
            }
            term icmp6 {
                from {
                    next-header icmp6;
                    icmp-type [ echo-request echo-reply time-exceeded membership-query membership-report neighbor-advertisement neighbor-solicit router-advertisement router-solicit packet-too-big parameter-problem ];
                }
                then {
                    policer police-5mbps;
                    count cpp-icmp-accept-v6;
                }
            }
            term bgp {
                from {
                    next-header tcp;
                    destination-port bgp;
                }
                then {
                    count cpp-bgp-accept-v6;
                    accept;
                }
            }
            term dns {
                from {
                    next-header udp;
                    destination-port 53;
                }
                then {
                    count cpp-dns-accept-v6;
                    accept;
                }
            }
            term dns-rep {
                from {
                    next-header udp;
                    source-port 53;
                }
                then {
                    count cpp-dns-rep-accept-v6;
                    accept;
                }
            }
            term ntp {
                from {
                    next-header udp;
                    destination-port ntp;
                }
                then {
                    count cpp-ntp-accept-v6;
                    accept;
                }
            }
            term ntp-rep {
                from {
                    next-header udp;
                    source-port ntp;
                }
                then {
                    count cpp-ntp-rep-accept-v6;
                    accept;
                }
            }
            term dhcp {
                from {
                    next-header udp;
                    destination-port [ 546 547 ];
                }
                then {
                    count cpp-dhcp-accept-v6;
                    accept;
                }
            }
            term dhcpv6-from-server {
                from {
                    next-header udp;
                    source-port 547;
                }
                then {
                    count cpp-dhcp-from-server-accept-v6;
                    accept;
                }
            }
            term netconf {
                from {
                    next-header tcp;
                    destination-port 830;
                }
                then {
                    count cpp-netconf-accept-v6;
                    accept;
                }
            }
            term bfd {
                from {
                    next-header udp;
                    destination-port [ 3784 4784 3785 ];
                }
                then {
                    count cpp-bfd-accept-v6;
                    accept;
                }
            }
            term bfd-rep {
                from {
                    next-header udp;
                    source-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-rep-accept-v6;
                    accept;
                }
            }
            term snmp {
                from {
                    next-header udp;
                    destination-port snmp;
                }
                then {
                    count cpp-snmp-accept-v6;
                    accept;
                }
            }
            term ospf {
                from {
                    next-header ospf;
                }
                then {
                    count cpp-ospf-accept-v6;
                    accept;
                }
            }
            term fetch {
                from {
                    next-header tcp;
                    destination-port 8080;
                }
                then {
                    count cpp-fetch-accept-v6;
                    accept;
                }
            }
            term openssl {
                from {
                    next-header tcp;
                    destination-port 32767;
                }
                then {
                    count cpp-openssl-accept-v6;
                    accept;
                }
            }
            term tcp-established {
                from {
                    next-header tcp;
                    tcp-established;
                }
                then {
                    count cpp-tcp-established-accept-v6;
                    accept;
                }
            }
            term discard-rest {
                then {
                    count cpp-discard-rest-v6;
                    discard;
                }
            }
        }
    }
    policer police-5mbps {
        if-exceeding {
            bandwidth-limit 5m;
            burst-size-limit 5m;
        }
        then discard;
    }
}
routing-options {
    router-id 192.168.255.5;
    autonomous-system 64512;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
    }
}
protocols {
    router-advertisement {
        interface et-0/0/0.0 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/1.0 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/2.0 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/5.0 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/6.0 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
    }
    bgp {
        group l3clos-s {
            type external;
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 100;
                multiplier 3;
            }
            neighbor fdf6:ed70:1fac:f2d1::1 {
                description facing_dc1-borderleaf-001-leaf1;
                local-address fdf6:ed70:1fac:f2d1::;
                family inet6 {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64514;
            }
            neighbor fdf6:ed70:1fac:f2d1::3 {
                description facing_dc1-borderleaf-001-leaf2;
                local-address fdf6:ed70:1fac:f2d1::2;
                family inet6 {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64515;
            }
            neighbor fdf6:ed70:1fac:f2d1::5 {
                description facing_dc1-esi-001-leaf1;
                local-address fdf6:ed70:1fac:f2d1::4;
                family inet6 {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64516;
            }
            neighbor fdf6:ed70:1fac:f2d1::7 {
                description facing_dc1-esi-001-leaf2;
                local-address fdf6:ed70:1fac:f2d1::6;
                family inet6 {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64517;
            }
            neighbor fdf6:ed70:1fac:f2d1::9 {
                description facing_dc1-single-001-leaf1;
                local-address fdf6:ed70:1fac:f2d1::8;
                family inet6 {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64518;
            }
            neighbor 10.0.1.1 {
                description facing_dc1-borderleaf-001-leaf1;
                local-address 10.0.1.0;
                family inet {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64514;
            }
            neighbor 10.0.1.3 {
                description facing_dc1-borderleaf-001-leaf2;
                local-address 10.0.1.2;
                family inet {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64515;
            }
            neighbor 10.0.1.5 {
                description facing_dc1-esi-001-leaf1;
                local-address 10.0.1.4;
                family inet {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64516;
            }
            neighbor 10.0.1.7 {
                description facing_dc1-esi-001-leaf2;
                local-address 10.0.1.6;
                family inet {
                    unicast;
                }
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 64517;
            }
            neighbor 10.0.1.9 {
                description facing_dc1-single-001-leaf1;
                local-address 10.0.1.8;
