policy-options {
    prefix-list bgp-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list ntp-sources {
        10.0.0.0/8;
        66.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list snmp-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    prefix-list ssh-sources {
        10.0.0.0/8;
        172.0.0.0/8;
        192.0.0.0/8;
    }
    route-filter-list RoutesFromExt-yellow-external_router {
        0.0.0.0/0 exact;
    }
    route-filter-list RoutesFromExtV6-yellow-external_router {
        0::0/0 exact;
    }
    route-filter-list RoutesToExt-yellow-external_router {
        10.20.0.0/16 upto /32;
        10.25.0.0/16 upto /32;
        10.30.0.0/24 upto /32;
        192.168.11.0/30 upto /32;
        192.168.11.4/32 exact;
    }
    route-filter-list RoutesToExtV6-yellow-external_router {
        2001:db8:dc1:10:14::/80 upto /128;
        2001:db8:dc1:10:19::/80 upto /128;
        2001:db8:dc1:10:30::/96 upto /128;
        fdf6:ed70:1fac:f2d1::2000/127 upto /128;
        fdf6:ed70:1fac:f2d1::200a/127 upto /128;
        fdf6:ed70:1fac:f2d1::200c/128 exact;
    }
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V6;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then reject;
        }
    }
    policy-statement AllPodNetworks-blue {
        term AllPodNetworks-blue-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add BLUE_COMMUNITY_V4;
                accept;
            }
        }
        term AllPodNetworks-blue-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add BLUE_COMMUNITY_V6;
                accept;
            }
        }
        term AllPodNetworks-blue-100 {
            then reject;
        }
    }
    policy-statement AllPodNetworks-yellow {
        term AllPodNetworks-yellow-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add YELLOW_COMMUNITY_V4;
                accept;
            }
        }
        term AllPodNetworks-yellow-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add YELLOW_COMMUNITY_V6;
                accept;
            }
        }
        term AllPodNetworks-yellow-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from policy AllPodNetworks;
            then accept;
        }
        term BGP-AOS-Policy-20 {
            from protocol bgp;
            then accept;
        }
        term BGP-AOS-Policy-50 {
            from {
                protocol evpn;
                route-filter 0.0.0.0/0 prefix-length-range /32-/32;
            }
            then accept;
        }
        term BGP-AOS-Policy-60 {
            from {
                protocol evpn;
                route-filter 0::0/0 prefix-length-range /128-/128;
            }
            then accept;
        }
        term BGP-AOS-Policy-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy-blue {
        term BGP-AOS-Policy-blue-10 {
            from policy AllPodNetworks-blue;
            then accept;
        }
        term BGP-AOS-Policy-blue-20 {
            from protocol bgp;
            then accept;
        }
        term BGP-AOS-Policy-blue-50 {
            from {
                protocol evpn;
                route-filter 0.0.0.0/0 prefix-length-range /32-/32;
            }
            then {
                community add BLUE_COMMUNITY_V4;
                accept;
            }
        }
        term BGP-AOS-Policy-blue-60 {
            from {
                protocol evpn;
                route-filter 0::0/0 prefix-length-range /128-/128;
            }
            then {
                community add BLUE_COMMUNITY_V6;
                accept;
            }
        }
        term BGP-AOS-Policy-blue-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy-yellow {
        term BGP-AOS-Policy-yellow-10 {
            from policy AllPodNetworks-yellow;
            then accept;
        }
        term BGP-AOS-Policy-yellow-20 {
            from protocol bgp;
            then accept;
        }
        term BGP-AOS-Policy-yellow-50 {
            from {
                protocol evpn;
                route-filter 0.0.0.0/0 prefix-length-range /32-/32;
            }
            then {
                community add YELLOW_COMMUNITY_V4;
                accept;
            }
        }
        term BGP-AOS-Policy-yellow-60 {
            from {
                protocol evpn;
                route-filter 0::0/0 prefix-length-range /128-/128;
            }
            then {
                community add YELLOW_COMMUNITY_V6;
                accept;
            }
        }
        term BGP-AOS-Policy-yellow-100 {
            then reject;
        }
    }
    policy-statement EVPN_EXPORT {
        term EVPN_EXPORT-4095 {
            then accept;
        }
    }
    policy-statement LEAF_TO_SPINE_EVPN_OUT {
        term LEAF_TO_SPINE_EVPN_OUT-10 {
            from {
                protocol bgp;
                community FROM_SPINE_EVPN_TIER;
            }
            then reject;
        }
        term LEAF_TO_SPINE_EVPN_OUT-20 {
            then accept;
        }
    }
    policy-statement LEAF_TO_SPINE_FABRIC_OUT {
        term LEAF_TO_SPINE_FABRIC_OUT-10 {
            from {
                protocol bgp;
                community FROM_SPINE_FABRIC_TIER;
            }
            then reject;
        }
        term LEAF_TO_SPINE_FABRIC_OUT-20 {
            then accept;
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
    policy-statement RoutesFromExt-yellow-external_router {
        term RoutesFromExt-yellow-external_router-10 {
            from {
                family inet;
                route-filter-list RoutesFromExt-yellow-external_router;
            }
            then {
                community add RoutesFromExt-yellow-external_router;
                accept;
            }
        }
        term RoutesFromExt-yellow-external_router-20 {
            from {
                family inet6;
                route-filter-list RoutesFromExtV6-yellow-external_router;
            }
            then {
                community add RoutesFromExtV6-yellow-external_router;
                accept;
            }
        }
        term RoutesFromExt-yellow-external_router-30 {
            from family inet;
            then reject;
        }
        term RoutesFromExt-yellow-external_router-40 {
            from family inet6;
            then reject;
        }
    }
    policy-statement RoutesToExt-yellow-external_router {
        term RoutesToExt-yellow-external_router-10 {
            from {
                family inet;
                route-filter-list RoutesToExt-yellow-external_router;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                accept;
            }
        }
        term RoutesToExt-yellow-external_router-20 {
            from {
                family inet6;
                route-filter-list RoutesToExtV6-yellow-external_router;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                accept;
            }
        }
        term RoutesToExt-yellow-external_router-30 {
            from family inet;
            then reject;
        }
        term RoutesToExt-yellow-external_router-40 {
            from family inet6;
            then reject;
        }
    }
    community BLUE_COMMUNITY_V4 members [ 4:20007 21002:26000 ];
    community BLUE_COMMUNITY_V6 members [ 4:20008 21002:26000 ];
    community DEFAULT_DIRECT_V4 members [ 4:20007 21001:26000 ];
    community DEFAULT_DIRECT_V6 members [ 4:20008 21001:26000 ];
