firewall {
    family inet {
        filter cpp-filter-v1 {
            term ssh {
                from {
                    source-prefix-list {
                        ssh-sources;
                    }
                    protocol tcp;
                    destination-port ssh;
                }
                then {
                    count cpp-ssh-accept;
                    accept;
                }
            }
            term icmp {
                from {
                    protocol icmp;
                    icmp-type [ echo-request echo-reply unreachable time-exceeded ];
                }
                then {
                    policer police-5mbps;
                    count cpp-icmp-accept;
                    accept;
                }
