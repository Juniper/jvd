system {
    ports {
        console log-out-on-disconnect;
    }
}
interfaces {
    xe-0/0/1:0 {
        vlan-tagging;
        unit 0 {
            vlan-id 0;
            family inet;
        }
        unit 199 {
            vlan-id 199;
            family inet {
                address 10.200.0.1/31;
            }
            family inet6 {
                address 2001:db8:dc1:10:200::1/127;
            }
        }
    }
    xe-0/0/1:1 {
        vlan-tagging;
        unit 0 {
            vlan-id 0;
            family inet;
        }
        unit 199 {
            vlan-id 199;
            family inet {
                address 10.200.0.3/31;
            }
            family inet6 {
                address 2001:db8:dc1:10:200::3/127;
            }
        }
    }
    xe-0/0/3:0 {
        vlan-tagging;
        unit 0 {
            vlan-id 1100;
            family inet {
                address 192.168.36.1/24;
            }
            family inet6 {
                address 2001:db8:192:168:36::1/112;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 100.100.100.100/32;
            }
            family inet6 {
                address 2001:db8:100:100:100::100/128;
            }
        }
    }
}
policy-options {
    route-filter-list RoutesToExternal {
        10.12.0.0/16 orlonger;
        10.22.0.0/16 orlonger;
        10.10.0.0/16 orlonger;
        10.11.0.0/16 orlonger;
        10.21.0.0/16 orlonger;
        10.9.11.0/24 orlonger;
        10.9.22.0/24 orlonger;
        10.13.0.0/16 orlonger;
    }
    route-filter-list RoutesToFabric {
        0.0.0.0/0 exact;
        ::/0 exact;
    }
    policy-statement AllRoutes {
        term 1 {
            from protocol bgp;
            then {
                next-hop self;
                accept;
            }
        }
        term 2 {
            then reject;
        }
    }
    policy-statement RoutesToExt {
        term 1 {
            from interface lo0.0;
            then accept;
        }
        term 2 {
            from {
                protocol bgp;
                route-filter-list RoutesToExternal;
            }
            then {
                next-hop self;
                accept;
            }
        }
        term 3 {
            then reject;
        }
    }
    policy-statement RoutesToFabric {
        term 1 {
            from interface lo0.0;
            then accept;
        }
        term 2 {
            from {
                protocol [ static bgp ];
                route-filter 0.0.0.0/0 exact;
            }
            then accept;
        }
        term 3 {
            from {
                protocol [ static bgp ];
                rib inet6.0;
                route-filter ::/0 exact;
            }
            then accept;
        }
        term 4 {
            then reject;
        }
    }
}
routing-options {
    route-distinguisher-id 100.100.100.100;
    rib inet6.0 {
        static {
            route ::/0 discard;
        }
    }
    autonomous-system 65000;
    static {
        route 0.0.0.0/0 discard;
    }
}
protocols {
    bgp {
        group fabric {
            type external;
            multihop {
                ttl 1;
            }
            multipath {
                multiple-as;
            }
            neighbor 10.200.0.0 {
                export RoutesToFabric;
                peer-as 64514;
            }
            neighbor 2001:db8:dc1:10:200::0 {
                export RoutesToFabric;
                peer-as 64514;
            }
            neighbor 10.200.0.2 {
                export RoutesToFabric;
                peer-as 64515;
            }
            neighbor 2001:db8:dc1:10:200::2 {
                export RoutesToFabric;
                peer-as 64515;
            }
        }
    }
}
