system {
    ports {
        console log-out-on-disconnect;
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 5;
        }
    }
    fpc 1 {
        pic 0 {
            port 2 {
                speed 100g;
            }
            port 3 {
                speed 100g;
            }
        }
        pic 1 {
            port 0 {
                speed 10g;
            }
            port 1 {
                speed 10g;
            }
            port 2 {
                speed 10g;
            }
            port 3 {
                speed 10g;
            }
        }
    }
    high-availability {
        local-id {
            2;
            local-ip 192.168.250.11;
        }
        peer-id 1 {
            peer-ip 192.168.250.10;
            interface ae0.0;
            routing-instance ICL;
            liveness-detection {
                minimum-interval 500;
                multiplier 3;
            }
        }
    }
}
security {
    address-book {
        global {
            address red_hosts 10.1.0.0/16;
            address blue_hosts 10.10.0.0/16;
            address SPINE1-LOOPBACK 192.168.255.5/32;
            address SPINE2-LOOPBACK 192.168.255.6/32;
            address LOOPBACK 192.168.250.1/32;
            address red_sub_hosts 10.5.0.0/16;
            address blue_sub_hosts 10.15.0.0/16;
            address green_hosts 10.20.0.0/16;
            address green_sub_hosts 10.25.0.0/16;
            address blue_v6_hosts 2001:db8:dc1:10:0a:00::/80;
            address blue_v6_sub_hosts 2001:db8:dc1:10:0f:00::/80;
            address green_v6_hosts 2001:db8:dc1:10:14:00::/80;
            address green_v6_sub_hosts 2001:db8:dc1:10:19:00::/80;
            address default 0.0.0.0/0;
            address default_v6 0::0/0;
            address red_v6_hosts 2001:db8:dc1:10:01:00::/80;
            address red_sub_v6_hosts 2001:db8:dc1:10:05:00::/80;
        }
    }
    policies {
        from-zone untrust to-zone untrust {
            policy VRF-BLOCK {
                match {
                    source-address [ blue_hosts green_hosts green_sub_hosts blue_sub_hosts blue_v6_hosts green_v6_hosts blue_v6_sub_hosts green_v6_sub_hosts default default_v6 ];
                    destination-address [ red_hosts red_sub_hosts red_v6_hosts red_sub_v6_hosts ];
                    application any;
                    source-l3vpn-vrf-group VRF_GROUP1;
                }
                then {
                    reject;
                }
            }
            policy VRF-POl1 {
                match {
                    source-address [ blue_hosts green_hosts green_sub_hosts blue_sub_hosts blue_v6_hosts green_v6_hosts blue_v6_sub_hosts green_v6_sub_hosts ];
                    destination-address [ blue_hosts blue_sub_hosts green_hosts green_sub_hosts blue_v6_hosts green_v6_hosts blue_v6_sub_hosts green_v6_sub_hosts default default_v6 ];
                    application any;
                    source-l3vpn-vrf-group VRF_GROUP1;
                }
                then {
                    permit;
                }
            }
            policy untr-untr-bfd {
                match {
                    source-address [ SPINE1-LOOPBACK SPINE2-LOOPBACK LOOPBACK ];
                    destination-address [ SPINE1-LOOPBACK SPINE2-LOOPBACK LOOPBACK ];
                    application any;
                }
                then {
                    permit;
                }
            }
        }
        from-zone ICL to-zone ICL {
            policy allow {
                match {
                    source-address default;
                    destination-address default;
                    application any;
                }
                then {
                    permit;
                }
            }
        }
    }
    zones {
        security-zone untrust {
            host-inbound-traffic {
                system-services {
                    all;
                }
                protocols {
                    all;
                }
            }
            interfaces {
                et-1/0/2.0;
                et-1/0/3.0;
                lo0.0;
            }
        }
        security-zone ICL {
            host-inbound-traffic {
                system-services {
                    ike;
                    high-availability;
                    ping;
                }
                protocols {
                    bfd;
                }
            }
            interfaces {
                ae0.0;
                lo0.1;
            }
        }
    }
    l3vpn {
        vrf-group VRF_GROUP1 {
            vrf [ blue green ];
        }
    }
}
interfaces {
    et-1/0/2 {
        unit 0 {
            family inet {
                address 10.200.1.5/31;
            }
        }
    }
    et-1/0/3 {
        unit 0 {
            family inet {
                address 10.200.1.7/31;
            }
        }
    }
    xe-1/1/0 {
        ether-options {
            802.3ad ae0;
        }
    }
    xe-1/1/1 {
        ether-options {
            802.3ad ae0;
        }
    }
    xe-1/1/2 {
        ether-options {
            802.3ad ae0;
        }
    }
    xe-1/1/3 {
        ether-options {
            802.3ad ae0;
        }
    }
    ae0 {
        unit 0 {
            family inet {
                address 10.222.222.2/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.250.2/32;
            }
        }
        unit 1 {
            family inet {
                address 192.168.250.11/32;
            }
        }
    }
}
policy-options {
    policy-statement blue_EXPORT {
        term 1 {
            then {
                community add COMM_blue;
                accept;
            }
        }
    }
    policy-statement blue_IMPORT {
        term 1 {
            from community [ COMM_blue COMM_red COMM_green COMM_yellow ];
            then accept;
        }
    }
    policy-statement green_EXPORT {
        term 1 {
            then {
                community add COMM_green;
                accept;
            }
        }
    }
    policy-statement green_IMPORT {
        term 1 {
            from community [ COMM_blue COMM_red COMM_green COMM_yellow ];
            then accept;
        }
    }
    policy-statement loops {
        term 1 {
            from {
                protocol direct;
                interface lo0.0;
            }
            then accept;
        }
    }
    policy-statement overlay-out {
        term 1 {
            from {
                instance red;
                family evpn;
                route-filter 0.0.0.0/0 exact;
            }
            then accept;
        }
        term 2 {
            from {
                instance red;
                family evpn;
                route-filter 0::0/0 exact;
            }
            then accept;
        }
        term 10 {
            from {
                instance blue;
                family evpn;
                route-filter 0.0.0.0/0 exact;
            }
            then accept;
        }
        term 11 {
            from {
                instance blue;
                family evpn;
                route-filter 0::0/0 exact;
            }
            then accept;
        }
        term 20 {
            from {
                instance green;
                family evpn;
                route-filter 0.0.0.0/0 exact;
            }
            then accept;
        }
        term 21 {
            from {
                instance green;
                family evpn;
                route-filter 0::0/0 exact;
            }
            then accept;
        }
        term 700 {
            from {
                instance red;
                family evpn;
            }
            then reject;
        }
        term 800 {
            from {
                instance green;
                family evpn;
            }
            then reject;
        }
        term 900 {
            from {
                instance blue;
                family evpn;
            }
            then reject;
        }
    }
    policy-statement red_EXPORT {
        term 1 {
            then {
                community add COMM_red;
                accept;
            }
        }
    }
    policy-statement red_IMPORT {
        term 1 {
            from community [ COMM_red COMM_blue COMM_green COMM_yellow ];
            then accept;
        }
    }
    policy-statement yellow_EXPORT {
        term 1 {
            then {
                community add COMM_yellow;
                accept;
            }
        }
    }
    policy-statement yellow_IMPORT {
        term 1 {
            from community [ COMM_red COMM_blue COMM_green COMM_yellow ];
            then accept;
        }
    }
    community COMM_blue members target:20002:1;
    community COMM_green members target:20004:1;
    community COMM_red members target:20001:1;
    community COMM_yellow members target:20005:1;
}
routing-instances {
    ICL {
        instance-type virtual-router;
        routing-options {
            static {
                route 192.168.250.10/32 next-hop 10.222.222.1;
            }
        }
        interface ae0.0;
        interface lo0.1;
    }
    blue {
        instance-type vrf;
        routing-options {
            rib blue.inet6.0 {
                static {
                    route 0::0/0 {
                        discard;
                        preference 180;
                    }
                }
            }
            static {
                route 0.0.0.0/0 {
                    discard;
                    preference 180;
                }
            }
            multipath;
        }
        protocols {
            evpn {
                interconnect {
                    vrf-target target:20002:1;
                    route-distinguisher 192.168.250.2:3;
                }
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 20002;
                }
            }
        }
        route-distinguisher 192.168.250.2:11;
        vrf-import blue_IMPORT;
        vrf-export blue_EXPORT;
        vrf-table-label;
    }
    green {
        instance-type vrf;
        routing-options {
            rib green.inet6.0 {
                static {
                    route 0::0/0 {
                        discard;
                        preference 180;
                    }
                }
            }
            static {
                route 0.0.0.0/0 {
                    discard;
                    preference 180;
                }
            }
            multipath;
        }
        protocols {
            evpn {
                interconnect {
                    vrf-target target:20004:1;
                    route-distinguisher 192.168.250.2:4;
                }
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 20004;
                }
            }
        }
        route-distinguisher 192.168.250.2:12;
        vrf-import green_IMPORT;
        vrf-export green_EXPORT;
        vrf-table-label;
    }
    red {
        instance-type vrf;
        routing-options {
            rib red.inet6.0 {
                static {
                    route 0::0/0 {
                        discard;
                        preference 180;
                    }
                }
            }
            static {
                route 0.0.0.0/0 {
                    discard;
                    preference 180;
                }
            }
            multipath;
        }
        protocols {
            evpn {
                interconnect {
                    vrf-target target:20001:1;
                    route-distinguisher 192.168.250.2:2;
                }
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 20001;
                }
            }
        }
        route-distinguisher 192.168.250.2:10;
        vrf-import red_IMPORT;
        vrf-export red_EXPORT;
        vrf-table-label;
    }
    yellow {
        instance-type vrf;
        routing-options {
            multipath;
        }
        protocols {
            evpn {
                interconnect {
                    vrf-target target:20005:1;
                    route-distinguisher 192.168.250.2:5;
                }
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 20005;
                }
            }
        }
        route-distinguisher 192.168.250.2:13;
        vrf-import yellow_IMPORT;
        vrf-export yellow_EXPORT;
        vrf-table-label;
    }
}
protocols {
    bgp {
        group underlay {
            type external;
            export loops;
            neighbor 10.200.1.4 {
                peer-as 64512;
            }
            neighbor 10.200.1.6 {
                peer-as 64513;
            }
        }
        group overlay {
            type external;
            multihop;
            advertise-peer-as;
            family inet {
                unicast;
            }
            family evpn {
                signaling;
            }
            export overlay-out;
            multipath {
                multiple-as;
            }
            as-override;
            neighbor 192.168.255.5 {
                local-address 192.168.250.2;
                peer-as 64512;
            }
            neighbor 192.168.255.6 {
                local-address 192.168.250.2;
                peer-as 64513;
            }
            vpn-apply-export;
        }
    }
}
routing-options {
    autonomous-system 67002;
}
