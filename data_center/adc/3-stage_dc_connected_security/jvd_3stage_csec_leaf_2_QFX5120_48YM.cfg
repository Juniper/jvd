                    accept;
                }
            }
            term dhcp {
                from {
                    next-header udp;
                    destination-port [ 546 547 ];
                }
                then {
                    count cpp-dhcp-accept-v6;
                    accept;
                }
            }
            term dhcpv6-from-server {
                from {
                    next-header udp;
                    source-port 547;
                }
                then {
                    count cpp-dhcp-from-server-accept-v6;
                    accept;
                }
            }
            term netconf {
                from {
                    next-header tcp;
                    destination-port 830;
                }
                then {
                    count cpp-netconf-accept-v6;
                    accept;
                }
            }
            term bfd {
                from {
                    next-header udp;
                    destination-port [ 3784 4784 3785 ];
                }
                then {
                    count cpp-bfd-accept-v6;
                    accept;
                }
            }
            term bfd-rep {
                from {
                    next-header udp;
                    source-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-rep-accept-v6;
                    accept;
                }
            }
            term snmp {
                from {
                    next-header udp;
                    destination-port snmp;
                }
                then {
                    count cpp-snmp-accept-v6;
                    accept;
                }
            }
            term ospf {
                from {
                    next-header ospf;
                }
                then {
                    count cpp-ospf-accept-v6;
                    accept;
                }
            }
            term fetch {
                from {
                    next-header tcp;
                    destination-port 8080;
                }
                then {
                    count cpp-fetch-accept-v6;
                    accept;
                }
            }
            term openssl {
                from {
