firewall {
    family inet {
        filter cpp-filter-v1 {
            term ssh {
                from {
                    source-prefix-list {
                        ssh-sources;
                    }
                    protocol tcp;
                    destination-port ssh;
                }
                then {
                    count cpp-ssh-accept;
                    accept;
                }
            }
            term icmp {
                from {
                    protocol icmp;
                    icmp-type [ echo-request echo-reply unreachable time-exceeded ];
                }
                then {
                    policer police-5mbps;
                    count cpp-icmp-accept;
                    accept;
                }
            }
            term dns-req {
                from {
                    protocol udp;
                    destination-port 53;
                }
                then {
                    count cpp-dns-req-accept;
                    accept;
                }
            }
            term dns-rep {
                from {
                    protocol udp;
                    source-port 53;
                }
                then {
                    count cpp-dns-rep-accept;
                    accept;
                }
            }
            term ntp-rep {
                from {
                    source-prefix-list {
                        ntp-sources;
                    }
                    protocol udp;
                    source-port ntp;
                }
                then {
                    count cpp-ntp-rep-accept;
                    accept;
                }
            }
            term ntp-req {
                from {
                    protocol udp;
                    destination-port ntp;
                }
                then {
                    count cpp-ntp-req-accept;
                    accept;
                }
            }
            term dhcp-to-client {
                from {
                    protocol udp;
                    destination-port 68;
                }
                then {
                    count cpp-dhcp-to-client-accept;
                    accept;
                }
            }
            term dhcp-from-server {
                from {
                    protocol udp;
                    source-port 67;
                }
                then {
                    count cpp-dhcp-from-server-accept;
                    accept;
                }
            }
            term netconf {
                from {
                    source-prefix-list {
                        ssh-sources;
                    }
                    protocol tcp;
                    destination-port 830;
                }
                then {
                    count cpp-netconf-accept;
                    accept;
                }
            }
            term bfd {
                from {
                    protocol udp;
                    destination-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-accept;
                    accept;
                }
            }
            term bfd-rep {
                from {
                    protocol udp;
                    source-port [ 3784 3785 4784 ];
                }
                then {
                    count cpp-bfd-rep-accept;
                    accept;
                }
            }
            term bgp {
                from {
                    source-prefix-list {
                        bgp-sources;
                    }
                    protocol tcp;
                    destination-port 179;
                }
                then {
                    count bgp-accept;
                    accept;
                }
            }
            term snmp {
                from {
                    source-prefix-list {
                        snmp-sources;
                    }
                    protocol udp;
                    destination-port snmp;
                }
                then {
                    count cpp-snmp-accept;
                    accept;
                }
            }
            term ospf {
                from {
                    protocol ospf;
                }
                then {
                    count cpp-ospf-accept;
                    accept;
                }
            }
            term fetch {
                from {
                    protocol tcp;
                    destination-port 8080;
                }
                then {
                    count cpp-fetch-accept;
                    accept;
                }
            }
            term openssl {
                from {
                    protocol tcp;
                    destination-port 32767;
                }
                then {
                    count cpp-openssl-accept;
                    accept;
                }
            }
            term tcp-established {
                from {
                    protocol tcp;
                    tcp-established;
                }
                then {
                    count cpp-tcp-established-accept;
                    accept;
                }
            }
            term discard-rest {
                then {
                    count cpp-discard-rest;
                    discard;
                }
            }
        }
    }
    family inet6 {
        filter cpp-filter-v1-ipv6 {
            term ssh {
                from {
                    next-header tcp;
                    destination-port ssh;
                }
                then {
                    count cpp-ssh-accept-v6;
                    accept;
                }
            }
            term icmp6 {
                from {
                    next-header icmp6;
                    icmp-type [ echo-request echo-reply time-exceeded membership-query membership-report neighbor-advertisement neighbor-solicit router-advertisement router-solicit packet-too-big parameter-problem ];
                }
                then {
                    policer police-5mbps;
