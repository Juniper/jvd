version 23.4R2-S5.4-EVO;
apply-groups POC_lab;
groups POC_lab {
    system {
        host-name QFX5130-32CD-23;
        commit synchronize;
        domain-name svpoc.jnpr.net;
        backup-router 10.10.10.254;
        time-zone America/Los_Angeles;
        management-instance;
        name-server 10.10.10.253 routing-instance mgmt_junos;
        ntp server 10.10.10.251 routing-instance mgmt_junos;
        authentication-order [ radius password ];
        root-authentication {
            encrypted-password "encrypted-password";
        }
        login {
            message "Welcome to the Sunnyvale POC Lab";
            user jnpr {
                uid 2006;
                class super-user;
                authentication {
                    encrypted-password "encrypted-password";
                }
            }
        }
        syslog {
            user * {
                any emergency;
            }
            file messages {
                any notice;
                authorization info;
            }
        }
        services {
            ssh;
            netconf {
                ssh;
            }
        }
        radius-server 10.10.10.252 {
            secret "secret";
            retry 1;
        }
    }
    interfaces {
        re0:mgmt-0 {
            unit 0 {
                family inet {
                    address 10.10.10.1/21;
                }
            }
        }
    }
    routing-instances mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 {
                    next-hop 10.10.10.254;
                }
            }
        }
    }
    protocols {
        lldp {
            interface all;
        }
    }
}
system {
    host-name frontend-leaf1;
    management-instance;
    services {
        extension-service {
            request-response {
                grpc {
                    routing-instance mgmt_junos;
                    ssl {
                        port 32767;
                        local-certificate aos_grpc;
                    }
                }
            }
        }
    }
}
security {
    certificates {
        local {
            aos_grpc {
                "******";
            }
        }
    }
}
interfaces {
    et-0/0/0 {
        description facing_frontend-spine-1:et-0/0/0;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.1/31;
            }
        }
    }
    et-0/0/1 {
        description facing_frontend-spine-1:et-0/0/1;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.3/31;
            }
        }
    }
    et-0/0/2 {
        description facing_frontend-spine-2:et-0/0/0;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.9/31;
            }
        }
    }
    et-0/0/3 {
        description facing_frontend-spine-2:et-0/0/1;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.11/31;
            }
        }
    }
    et-0/0/8 {
        description "Breakout et-0/0/8";
        number-of-sub-ports 4;
        speed 10g;
    }
    et-0/0/8:0 {
        description to.headend-svr-01:eth0;
        native-vlan-id 3;
        mtu 9216;
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan members vn3;
            }
        }
    }
    et-0/0/28 {
        description "VRF default to Lambda-X13-01";
        speed 100g;
        unit 0 {
            family inet {
                address 10.10.1.29/31;
            }
        }
    }
    irb {
        mtu 9216;
        unit 3 {
            family inet {
                mtu 9000;
                address 10.10.3.1/24;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.0.4.0/32;
            }
        }
    }
}
policy-options {
    community DEFAULT_DIRECT_V4 members [ 3:20007 21001:26000 ];
    community FROM_SPINE_FABRIC_TIER members 0:15;
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then {
                reject;
            }
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from {
                policy AllPodNetworks;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-100 {
            then {
                reject;
            }
        }
    }
    policy-statement LEAF_TO_SPINE_FABRIC_OUT {
        term LEAF_TO_SPINE_FABRIC_OUT-10 {
            from {
                protocol bgp;
                community FROM_SPINE_FABRIC_TIER;
            }
            then {
                reject;
            }
        }
        term LEAF_TO_SPINE_FABRIC_OUT-20 {
            then {
                accept;
            }
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
}
routing-options {
    router-id 10.0.4.0;
    autonomous-system 4201032400;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
    }
}
protocols {
    bgp {
        log-updown;
        multipath;
        group l3clos-l {
            type external;
            multipath multiple-as;
            vpn-apply-export;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
            }
            neighbor 10.0.5.0 {
                description facing_frontend-spine-1;
                local-address 10.0.5.1;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032300;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.2 {
                description facing_frontend-spine-1;
                local-address 10.0.5.3;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032300;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.10 {
                description facing_frontend-spine-2;
                local-address 10.0.5.11;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032301;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.8 {
                description facing_frontend-spine-2;
                local-address 10.0.5.9;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032301;
                family inet {
                    unicast;
                }
            }
        }
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    l2-learning {
        telemetry enable-remote-entries;
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        neighbour-port-info-display port-id;
        interface all;
    }
    rstp {
        bridge-priority 0;
        bpdu-block-on-edge;
        interface et-0/0/8:0 {
            edge;
        }
    }
}
vlans {
    vn3 {
        description FrontEnd-Cluster-VN3;
        vlan-id 3;
        l3-interface irb.3;
    }
}
