version 23.4R2-S5.4-EVO;
apply-groups POC_lab;
groups POC_lab {
    system {
        host-name QFX5130-32CD-26;
        commit synchronize;
        domain-name svpoc.jnpr.net;
        backup-router 10.10.10.254;
        time-zone America/Los_Angeles;
        management-instance;
        name-server 10.10.10.253 routing-instance mgmt_junos;
        ntp server 10.10.10.251 routing-instance mgmt_junos;
        authentication-order [ radius password ];
        root-authentication {
            encrypted-password "encrypted-password";
        }
        login {
            message "Welcome to the Sunnyvale POC Lab";
            user jnpr {
                uid 2009;
                class super-user;
                authentication {
                    encrypted-password "encrypted-password";
                }
            }
        }
        syslog {
            user * {
                any emergency;
            }
            file messages {
                any notice;
                authorization info;
            }
        }
        services {
            ssh;
            netconf {
                ssh;
            }
        }
        radius-server 10.10.10.252 {
            secret "secret";
            retry 1;
        }
    }
    interfaces {
        re0:mgmt-0 {
            unit 0 {
                family inet {
                    address 10.10.10.4/21;
                }
            }
        }
    }
    routing-instances mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 {
                    next-hop x.x.x.x;
                }
            }
        }
    }
    protocols {
        lldp {
            interface all;
        }
    }
}
system {
    host-name frontend-leaf4;
    management-instance;
    services {
        extension-service {
            request-response {
                grpc {
                    routing-instance mgmt_junos;
                    ssl {
                        port 32770;
                        local-certificate aos_grpc;
                    }
                }
            }
        }
    }
}
security {
    certificates {
        local {
            aos_grpc {
                "******";
            }
        }
    }
}
interfaces {
    et-0/0/0 {
        description to.mi300-01;
        native-vlan-id 6;
        mtu 9216;
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan members vn6;
            }
        }
    }
    et-0/0/24 {
        description "Breakout et-0/0/24";
        number-of-sub-ports 2;
        speed 400g;
    }
    et-0/0/24:0 {
        description facing_frontend-spine-1:et-0/0/6;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.37/31;
            }
        }
    }
    et-0/0/24:1 {
        description facing_frontend-spine-1:et-0/0/7;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.39/31;
            }
        }
    }
    et-0/0/25 {
        description "Breakout et-0/0/25";
        number-of-sub-ports 2;
        speed 400g;
    }
    et-0/0/25:0 {
        description facing_frontend-spine-2:et-0/0/6;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.45/31;
            }
        }
    }
    et-0/0/25:1 {
        description facing_frontend-spine-2:et-0/0/7;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.47/31;
            }
        }
    }
    irb {
        mtu 9216;
        unit 6 {
            family inet {
                mtu 9000;
                address 10.10.6.254/24;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.0.4.5/32;
            }
        }
    }
}
policy-options {
    community DEFAULT_DIRECT_V4 members [ 6:20007 21001:26000 ];
    community FROM_SPINE_FABRIC_TIER members 0:15;
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then {
                reject;
            }
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from {
                policy AllPodNetworks;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-100 {
            then {
                reject;
            }
        }
    }
    policy-statement LEAF_TO_SPINE_FABRIC_OUT {
        term LEAF_TO_SPINE_FABRIC_OUT-10 {
            from {
                protocol bgp;
                community FROM_SPINE_FABRIC_TIER;
            }
            then {
                reject;
            }
        }
        term LEAF_TO_SPINE_FABRIC_OUT-20 {
            then {
                accept;
            }
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
}
routing-options {
    router-id 10.0.4.5;
    autonomous-system 4201032407;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
    }
}
protocols {
    bgp {
        log-updown;
        multipath;
        group l3clos-l {
            type external;
            multipath multiple-as;
            vpn-apply-export;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
            }
            neighbor 10.0.5.36 {
                description facing_frontend-spine-1;
                local-address 10.0.5.37;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032300;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.38 {
                description facing_frontend-spine-1;
                local-address 10.0.5.39;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032300;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.44 {
                description facing_frontend-spine-2;
                local-address 10.0.5.45;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032301;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.46 {
                description facing_frontend-spine-2;
                local-address 10.0.5.47;
                export ( LEAF_TO_SPINE_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032301;
                family inet {
                    unicast;
                }
            }
        }
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    l2-learning {
        telemetry enable-remote-entries;
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        neighbour-port-info-display port-id;
        interface all;
    }
    rstp {
        bridge-priority 0;
        bpdu-block-on-edge;
        interface et-0/0/0:0 {
            edge;
        }
    }
}
vlans {
    vn6 {
        description FrontEnd-Cluster-VN6;
        vlan-id 6;
        l3-interface irb.6;
    }
}
