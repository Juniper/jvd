policy-options {
    community DEFAULT_DIRECT_V4 members [ 2:20007 21001:26000 ];
    community FROM_SPINE_FABRIC_TIER members 0:15;
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then {
                reject;
            }
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from {
                policy AllPodNetworks;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-20 {
            from {
                protocol bgp;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-100 {
            then {
                reject;
            }
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
    policy-statement SPINE_TO_LEAF_FABRIC_OUT {
        term SPINE_TO_LEAF_FABRIC_OUT-10 {
            then {
                community add FROM_SPINE_FABRIC_TIER;
                accept;
            }
        }
    }
}
routing-options {
    router-id 10.0.3.1;
    autonomous-system 4201032301;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
    }
}
protocols {
    bgp {
        log-updown;
        multipath;
        group l3clos-s {
            type external;
            multipath multiple-as;
            vpn-apply-export;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
            }
            neighbor 10.0.5.11 {
                description facing_frontend-leaf1;
                local-address 10.0.5.10;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032400;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.9 {
                description facing_frontend-leaf1;
                local-address 10.0.5.8;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032400;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.13 {
                description facing_frontend-leaf2;
                local-address 10.0.5.12;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032401;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.15 {
                description facing_frontend-leaf2;
                local-address 10.0.5.14;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032401;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.41 {
                description facing_frontend-leaf3;
                local-address 10.0.5.40;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032406;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.43 {
                description facing_frontend-leaf3;
                local-address 10.0.5.42;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032406;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.45 {
                description facing_frontend-leaf4;
                local-address 10.0.5.44;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032407;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.47 {
                description facing_frontend-leaf4;
                local-address 10.0.5.46;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032407;
                family inet {
                    unicast;
                }
            }
        }
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        neighbour-port-info-display port-id;
        interface all;
    }
    rstp {
        disable;
    }
}
