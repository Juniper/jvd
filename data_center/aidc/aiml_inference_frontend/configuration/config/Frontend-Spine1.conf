version 25.2X100-D20.6-EVO;
apply-groups POC_lab;
groups POC_lab {
    system {
        host-name Storage-servers-leaf3;
        commit synchronize;
        domain-name svpoc.jnpr.net;
        backup-router 10.10.10.254;
        time-zone America/Los_Angeles;
        management-instance;
        name-server 10.10.10.253 routing-instance mgmt_junos;
        ntp server x.x.x.x routing-instance mgmt_junos;
        ntp server 10.161.216.1 routing-instance mgmt_junos;
        authentication-order [ radius password ];
        root-authentication {
            encrypted-password "encrypted-password";
        }
        login {
            message "Welcome to the Sunnyvale POC Lab";
            user jnpr {
                uid 2006;
                class super-user;
                authentication {
                    encrypted-password "encrypted-password";
                }
            }
        }
        syslog {
            user * {
                any emergency;
            }
            file messages {
                any notice;
                authorization info;
            }
        }
        services {
            ssh;
            netconf {
                ssh;
            }
        }
        radius-server 10.10.10.252 {
            secret "secret";
            retry 1;
        }
    }
    interfaces {
        re0:mgmt-0 {
            unit 0 {
                family inet {
                    address 10.10.10.5/21;
                }
            }
        }
    }
    routing-instances mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 {
                    next-hop 10.10.10.254;
                }
            }
        }
    }
    protocols {
        lldp {
            interface all;
        }
    }
}
system {
    host-name Frontend-Spine-1;
    management-instance;
    services {
        extension-service {
            request-response {
                grpc {
                    routing-instance mgmt_junos;
                    ssl {
                        port 32767;
                        local-certificate aos_grpc;
                    }
                }
            }
        }
    }
}
security {
    certificates {
        local {
            aos_grpc {
                "********";
            }
        }
    }
}
interfaces {
    et-0/0/0 {
        description facing_frontend-leaf1:et-0/0/0;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.0/31;
            }
        }
    }
    et-0/0/1 {
        description facing_frontend-leaf1:et-0/0/1;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.2/31;
            }
        }
    }
    et-0/0/2 {
        description facing_frontend-leaf2:et-0/0/0;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.4/31;
            }
        }
    }
    et-0/0/3 {
        description facing_frontend-leaf2:et-0/0/1;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.6/31;
            }
        }
    }
    et-0/0/4 {
        description facing_frontend-leaf3:et-0/0/24:0;
        mtu 9216;
        unit 0 {
            family inet {
                mtu 9170;
                address 10.0.5.32/31;
            }
        }
    }
    et-0/0/5 {
        description facing_frontend-leaf3:et-0/0/24:1;
        mtu 9216;
        unit 0 {
            family inet {
