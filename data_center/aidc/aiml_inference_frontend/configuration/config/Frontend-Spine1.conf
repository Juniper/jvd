    lo0 {
        unit 0 {
            family inet {
                address 10.0.3.0/32;
            }
        }
    }
}
policy-options {
    community DEFAULT_DIRECT_V4 members [ 1:20007 21001:26000 ];
    community FROM_SPINE_FABRIC_TIER members 0:15;
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then {
                reject;
            }
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from {
                policy AllPodNetworks;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-20 {
            from {
                protocol bgp;
            }
            then {
                accept;
            }
        }
        term BGP-AOS-Policy-100 {
            then {
                reject;
            }
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
    policy-statement SPINE_TO_LEAF_FABRIC_OUT {
        term SPINE_TO_LEAF_FABRIC_OUT-10 {
            then {
                community add FROM_SPINE_FABRIC_TIER;
                accept;
            }
        }
    }
}
routing-options {
    router-id 10.0.3.0;
    autonomous-system 4201032300;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
    }
}
protocols {
    bgp {
        log-updown;
        multipath;
        group l3clos-s {
            type external;
            multipath multiple-as;
            vpn-apply-export;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
            }
            neighbor 10.0.5.1 {
                description facing_frontend-leaf1;
                local-address 10.0.5.0;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032400;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.3 {
                description facing_frontend-leaf1;
                local-address 10.0.5.2;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032400;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.5 {
                description facing_frontend-leaf2;
                local-address 10.0.5.4;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032401;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.7 {
                description facing_frontend-leaf2;
                local-address 10.0.5.6;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032401;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.33 {
                description facing_frontend-leaf3;
                local-address 10.0.5.32;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032406;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.35 {
                description facing_frontend-leaf3;
                local-address 10.0.5.34;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032406;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.37 {
                description facing_frontend-leaf4;
                local-address 10.0.5.36;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032407;
                family inet {
                    unicast;
                }
            }
            neighbor 10.0.5.39 {
                description facing_frontend-leaf4;
                local-address 10.0.5.38;
                export ( SPINE_TO_LEAF_FABRIC_OUT && BGP-AOS-Policy );
                peer-as 4201032407;
                family inet {
                    unicast;
                }
            }
        }
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        neighbour-port-info-display port-id;
        interface all;
    }
    rstp {
        disable;
    }
}
