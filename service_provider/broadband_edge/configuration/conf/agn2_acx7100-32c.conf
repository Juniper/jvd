policy-options {
    prefix-list PL-AN-REGION {
        192.168.0.0/32;
        192.168.0.1/32;
        192.168.0.2/32;
        192.168.0.3/32;
        192.168.0.4/32;
    }
    prefix-list PL-CORE {
        192.168.0.7/32;
        192.168.0.8/32;
        192.168.0.11/32;
    }
    policy-statement PS-BGP-RR-EXPORT {
        term CORE-NHS {
            from {
                prefix-list PL-CORE;
            }
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement PS-CLIENT-RR-EXPORT {
        term LOOPBACKS {
            from {
                prefix-list PL-AN-REGION;
            }
            then accept;
        }
    }
    policy-statement PS-ISIS-EXPORT {
        term OOB-MGMT {
            from interface [ em0.0 fxp0.0 re0:mgmt-0.0 ];
            then reject;
        }
        term LOCAL-LOOPBACK-IPV4 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 192.168.0.6/32 exact;
            }
            then {
                prefix-segment {
                    index 1006;
                    node-segment;
                }
                accept;
            }
        }
        term LOCAL-LOOPBACK-IPV6 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 2001:db8::192:168:0:6/128 exact;
            }
            then {
                prefix-segment {
                    index 4006;
                    node-segment;
                }
                accept;
            }
        }
    }
    policy-statement PS-PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
}
routing-options {
    router-id 192.168.0.6;
    autonomous-system 65001;
    forwarding-table {
        export PS-PPLB;
    }
}
protocols {
    bgp {
        advertise-from-main-vpn-tables;
        vpn-apply-export;
        group GR-IBGP-FABRIC-RR {
            type internal;
            local-address 192.168.0.6;
            family inet {
                labeled-unicast {
                    rib {
                        inet.3;
                    }
                }
            }
            family inet6 {
                labeled-unicast {
                    rib {
                        inet6.3;
                    }
                }
            }
            family evpn {
                signaling;
            }
            cluster 192.168.0.6;
            bfd-liveness-detection {
                minimum-interval 100;
                multiplier 3;
            }
            neighbor 192.168.0.0;
            neighbor 192.168.0.1;
            neighbor 192.168.0.2;
            neighbor 192.168.0.3;
            neighbor 192.168.0.4;
        }
        group GR-IBGP-CR {
            type internal;
            local-address 192.168.0.6;
            family inet {
