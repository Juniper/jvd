firewall {
    family inet {
        filter clear-df-bit {
            interface-specific;
            term 1 {
                then {
                    accept;
                    dont-fragment clear;
                }
            }
        }
        filter rpf-pass-dhcp {
            term allow-dhcp {
                from {
                    destination-address {
                        255.255.255.255/32;
                    }
                    destination-port dhcp;
                }
                then accept;
            }
            term default {
                then {
                    discard;
                }
            }
        }
    }
    family inet6 {
        filter rpf-pass-dhcpv6 {
            term allow-dhcpv6 {
                from {
                    destination-address {
                        ffff::ffff/128;
                    }
                    destination-port dhcp;
                }
                then accept;
            }
            term default {
                then discard;
            }
        }
    }
}
