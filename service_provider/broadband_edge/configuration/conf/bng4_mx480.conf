

show configuration |no-more
system {
    commit synchronize;
    configuration-database {
        max-db-size 314572800;
    }
    services {
        subscriber-management {
            enable;
            redundancy {
                interface ps11.0 {
                    shared-key ps11-key;
                }
                interface ps12.0 {
                    shared-key ps12-key;
                }
                interface ps13.0 {
                    shared-key ps13-key;
                }
                interface ps14.0 {
                    shared-key ps14-key;
                }
                interface ps15.0 {
                    shared-key ps15-key;
                }
                interface ps16.0 {
                    shared-key ps16-key;
                }
                interface ps17.0 {
                    shared-key ps17-key;
                }
                interface ps18.0 {
                    shared-key ps18-key;
                }
                interface ps19.0 {
                    shared-key ps19-key;
                }
                interface ps20.0 {
                    shared-key ps20-key;
                }
                no-advertise-routes-on-backup;
                route-operation-interval 1;
            }
        }
    }
    ports {
        console log-out-on-disconnect;
    }
    dynamic-profile-options {
        versioning;
    }
    processes {
        smg-service;
    }
    ddos-protection {
        protocols {
            autoconf {
                aggregate {
                    bandwidth 20000;
                    burst 20000;
                }
            }
            pppoe {
                padse {
                    bandwidth 2000;
                    burst 100;
                }
            }
        }
    }
}
chassis {
    maximum-ecmp 128;
    redundancy {
        graceful-switchover;
    }
    aggregated-devices {
        ethernet {
            device-count 25;
        }
    }
    pseudowire-service {
        device-count 100;
    }
    fpc 0 {
        pic 0 {
            tunnel-services {
                bandwidth 100g;
            }
        }
    }
    fpc 2 {
        pic 0 {
            tunnel-services {
                bandwidth 100g;
            }
            port 2 {
                number-of-sub-ports 1;
                speed 100g;
            }
            port 5 {
                number-of-sub-ports 1;
                speed 100g;
            }
        }
    }
    fpc 5 {
        pic 0 {
            tunnel-services {
                bandwidth 100g;
            }
        }
    }
    network-services enhanced-ip;
}
access-profile vlan-auth-access1;
interfaces {
    et-2/0/2 {
        description R10-BNG4-To-R11-CR1-AE-MEMBER2;
        gigether-options {
            802.3ad ae1;
        }
    }
    et-2/0/5 {
        description R10-BNG4-To-R9-BNG3-AE-MEMBER1;
        gigether-options {
            802.3ad ae0;
        }
    }
    et-5/0/2 {
        description R10-BNG4-To-R11-CR1-AE-MEMBER1;
        gigether-options {
            802.3ad ae1;
        }
    }
    et-5/0/3 {
        description R10-BNG4-To-R9-BNG3-AE-MEMBER1;
        gigether-options {
            802.3ad ae0;
        }
    }
    ae0 {
        description R10-BNG4-To-R9-BNG3;
        aggregated-ether-options {
            lacp {
                active;
            }
        }
        unit 0 {
            family inet {
                address 10.10.111.2/24;
            }
            family iso;
            family inet6 {
                address 2001:db8::10:10:111:1:2/120;
            }
            family mpls {
                maximum-labels 16;
            }
        }
    }
    ae1 {
        description R10-BNG4-To-R11-CR1;
        aggregated-ether-options {
            lacp {
                active;
            }
        }
        unit 0 {
            family inet {
                address 10.10.110.1/24;
            }
            family iso;
            family inet6 {
                address 2001:db8::10:10:110:1:1/120;
            }
            family mpls {
                maximum-labels 16;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.10/32 {
                    primary;
                }
            }
            family iso {
                address 49.0000.0010.0100.0010.00;
            }
            family inet6 {
                address 2001:db8::192:168:0:a/128 {
                    primary;
                }
            }
        }
        unit 1 {
            family inet {
                address 192.168.10.10/32 {
                    primary;
                }
            }
            family inet6 {
                address 2001:db8::192:168:a:a/128 {
                    primary;
                }
            }
        }
        unit 7 {
            family inet {
                address 192.168.20.20/32 {
                    primary;
                }
            }
            family inet6 {
                address 2001:db8::192:168:1a:1a/128 {
                    primary;
                }
            }
        }
        unit 313 {
            description "VRF:dhcp-subs Loopback";
            family inet {
                address 10.45.0.1/32 {
                    primary;
                }
                address 172.20.20.10/32;
            }
            family inet6 {
                address fc00:128:140::1/128 {
                    primary;
                }
            }
        }
    }
    ps0 {
        anchor-point {
            lt-2/0/0;
        }
        flexible-vlan-tagging;
        auto-configure {
            stacked-vlan-ranges {
                dynamic-profile auto-stacked-pwht {
                    accept [ pppoe inet inet6 ];
                    ranges {
                        any,any;
                    }
                }
                authentication {
                    packet-types [ pppoe any ];
                    password joshua;
                    username-include {
                        domain-name jnpr.net;
                        user-prefix pwht_pppoe;
                    }
                }
                access-profile vlan-auth-access1;
            }
            remove-when-no-subscribers;
        }
        mtu 2022;
        esi {
            00:10:12:12:12:12:12:00:00:31;
            single-active;
            df-election-type {
                preference {
                    value 700;
                }
            }
        }
        no-gratuitous-arp-request;
        unit 0 {
            encapsulation ethernet-ccc;
        }
    }
