                            overrides {
                                delegated-pool dhcp_v6_pool;
                                dual-stack dhcp-ds;
                            }
                            interface demux0.0;
                            interface demux0.1;
                            interface ps11.0;
                            interface ps12.0;
                            interface ps13.0;
                            interface ps14.0;
                            interface ps15.0;
                            interface ps16.0;
                            interface ps17.0;
                            interface ps18.0;
                            interface ps19.0;
                            interface ps20.0;
                            interface ps32.0;
                            interface ps36.0;
                        }
                        server-duid-type {
                            duid_ll;
                        }
                    }
                    pool-match-order {
                        ip-address-first;
                    }
                    group dhcp-ls {
                        overrides {
                            client-discover-match incoming-interface;
                            dual-stack dhcp-ds;
                        }
                        interface demux0.0;
                        interface demux0.1;
                        interface ps11.0;
                        interface ps12.0;
                        interface ps13.0;
                        interface ps14.0;
                        interface ps15.0;
                        interface ps16.0;
                        interface ps17.0;
                        interface ps18.0;
                        interface ps19.0;
                        interface ps20.0;
                        interface ps32.0;
                        interface ps36.0;
                    }
                    dual-stack-group dhcp-ds {
                        authentication {
                            password joshua;
                            username-include {
                                domain-name jnpr.net;
                                user-prefix pwht_dhcp;
                            }
                        }
                        dynamic-profile prod-dhcp-base;
                        on-demand-address-allocation;
                        classification-key {
                            mac-address;
                        }
                    }
                    no-stale-timer-refresh;
                    stale-timer 60;
                }
            }
        }
        access {
            address-assignment {
                high-utilization 80;
                abated-utilization 70;
                pool dhcp_v4_pool {
                    family inet {
                        network 10.45.0.0/16;
                        range range1 {
                            low 10.45.0.2;
                            high 10.45.255.254;
                        }
                        dhcp-attributes {
                            maximum-lease-time 600;
                            server-identifier 10.45.0.1;
                            router {
                                10.45.0.1;
                            }
                        }
                    }
                }
                pool dhcp_v6_pool {
                    family inet6 {
                        prefix fc00:128:140::/64;
                        range rangev6 {
                            low fc00:128:140::2/128;
                            high fc00:128:140::ffff/128;
                        }
                        dhcp-attributes {
                            maximum-lease-time 600;
                        }
                    }
                }
            }
        }
        access-profile vlan-auth-access1;
        interface lo0.313;
        route-distinguisher 192.168.210.210:1046;
        vrf-import dhcp-subs-vrf-import-pol;
        vrf-export dhcp-subs-vrf-export-pol;
        vrf-table-label;
    }
}
dynamic-profiles {
    auto-stacked-pwht_dhcp {
        predefined-variable-defaults {
            routing-instances dhcp-subs;
        }
        routing-instances {
            "$junos-routing-instance" {
                interface "$junos-interface-name";
            }
        }
        interfaces {
            "$junos-interface-ifd-name" {
                unit "$junos-interface-unit" {
                    no-traps;
                    proxy-arp unrestricted;
                    vlan-tags outer "$junos-stacked-vlan-id" inner "$junos-vlan-id";
                    demux-options {
                        underlying-interface "$junos-interface-ifd-name";
                    }
                    family inet {
                        mac-validate loose;
                        unnumbered-address "$junos-loopback-interface";
                        auto-configure {
                            address-ranges {
                                dynamic-profile prof_autosense_ipdemux {
                                    network 10.42.0.0/16;
                                    network 10.43.0.0/16;
                                    network 10.44.0.0/16;
                                    network 10.45.0.0/16;
                                }
                                authentication {
                                    password joshua;
                                    username-include {
                                        domain-name jnpr.net;
                                        user-prefix pwht_dhcp;
                                    }
                                }
                                session-timeout 600;
                            }
                        }
                    }
                    family inet6 {
                        unnumbered-address "$junos-loopback-interface";
                        auto-configure {
                            prefix-ranges {
                                dynamic-profile prof_autosense_ipdemux {
                                    prefix fc00:125:140::/48;
                                    prefix fc00:126:140::/48;
                                    prefix fc00:127:140::/48;
                                    prefix fc00:128:140::/48;
                                }
                                authentication {
                                    password joshua;
                                    username-include {
                                        domain-name jnpr.net;
                                        user-prefix pwht_dhcp;
                                    }
                                }
                                session-timeout 600;
                            }
                        }
                    }
                }
            }
        }
        protocols {
            router-advertisement {
                interface "$junos-interface-name" {
                    max-advertisement-interval 60;
                    min-advertisement-interval 30;
                    managed-configuration;
                    other-stateful-configuration;
                }
            }
        }
    }
    auto-stacked-pwht {
        predefined-variable-defaults {
            routing-instances PPPOE_SUBS_1;
        }
        routing-instances {
            "$junos-routing-instance" {
                interface "$junos-interface-name";
            }
        }
        interfaces {
            interface-set "$junos-phy-ifd-interface-set-name" {
                interface "$junos-interface-ifd-name" {
                    unit "$junos-interface-unit";
                }
            }
            "$junos-interface-ifd-name" {
                unit "$junos-interface-unit" {
                    actual-transit-statistics;
                    no-traps;
                    proxy-arp restricted;
                    vlan-tags outer "$junos-stacked-vlan-id" inner "$junos-vlan-id";
                    family inet {
                        mac-validate loose;
                        unnumbered-address lo0.0;
                    }
                    family inet6 {
                        unnumbered-address "$junos-loopback-interface";
                    }
                    family pppoe {
                        duplicate-protection;
                        dynamic-profile prod-pppoe-dt-base;
                        short-cycle-protection {
                            lockout-time-min 5;
                            lockout-time-max 60;
                        }
                    }
                }
            }
        }
    }
    prof_autosense_ipdemux {
        predefined-variable-defaults {
            routing-instances dhcp-subs;
        }
        routing-instances {
            "$junos-routing-instance" {
                interface "$junos-interface-name";
                routing-options {
                    rib inet6.0 {
                        access-internal {
                            route $junos-subscriber-ipv6-address {
                                qualified-next-hop "$junos-interface-name";
                            }
                        }
                    }
                    access-internal {
                        route $junos-subscriber-ip-address {
                            qualified-next-hop "$junos-interface-name";
                        }
                    }
                }
            }
        }
        interfaces {
            demux0 {
                unit "$junos-underlying-interface-unit" {
                    proxy-arp unrestricted;
                    family inet {
                        mac-validate loose;
                        unnumbered-address lo0.313;
                    }
                    family inet6 {
                        unnumbered-address lo0.313;
                    }
                }
            }
        }
    }
    prod-dhcp-base {
        predefined-variable-defaults {
            routing-instances dhcp-subs;
        }
        routing-instances {
            "$junos-routing-instance" {
                interface "$junos-interface-name";
                routing-options {
                    access {
                        route $junos-framed-route-ip-address-prefix metric "$junos-framed-route-cost";
                    }
                }
            }
        }
        interfaces {
            demux0 {
                unit "$junos-interface-unit" {
                    actual-transit-statistics;
                    proxy-arp unrestricted;
                    demux-options {
                        underlying-interface "$junos-underlying-interface";
                    }
                    family inet {
                        rpf-check fail-filter rpf-pass-dhcp;
                        demux-source {
                            $junos-subscriber-ip-address;
                        }
                        unnumbered-address lo0.313;
                    }
                    family inet6 {
                        rpf-check fail-filter rpf-pass-dhcpv6;
                        demux-source {
                            "$junos-subscriber-ipv6-address";
                        }
                        unnumbered-address lo0.313;
                    }
                }
            }
        }
    }
    prod-pppoe-dt-base {
        predefined-variable-defaults {
            routing-instances PPPOE_SUBS_1;
        }
        routing-instances {
            "$junos-routing-instance" {
                interface "$junos-interface-name";
            }
        }
        interfaces {
            pp0 {
                unit "$junos-interface-unit" {
                    actual-transit-statistics;
                    no-traps;
                    ppp-options {
                        mru 1500;
                        mtu 1500;
                    }
                    pppoe-options {
                        underlying-interface "$junos-underlying-interface";
                        server;
                    }
                    keepalives interval 30;
                    family inet {
                        rpf-check;
                        filter {
                            output clear-df-bit;
                        }
                        unnumbered-address "$junos-loopback-interface";
                    }
                    family inet6 {
                        unnumbered-address "$junos-loopback-interface";
                    }
                }
            }
        }
        protocols {
            router-advertisement {
                interface "$junos-interface-name" {
                    prefix $junos-ipv6-ndra-prefix;
                }
            }
        }
    }
}
routing-options {
    router-id 192.168.0.10;
    autonomous-system 65001;
    rib-groups {
        interface_routes {
            import-rib [ PPPOE_SUBS_1.inet6.0 inet6.0 ];
        }
    }
    nonstop-routing;
    forwarding-table {
        export PS-PPLB;
        chained-composite-next-hop {
            ingress {
                evpn;
            }
        }
    }
}
protocols {
    bgp {
        vpn-apply-export;
        group GR-IBGP-CR {
            type internal;
            local-address 192.168.0.10;
            family inet {
                labeled-unicast {
                    resolve-vpn;
                }
            }
            family inet-vpn {
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    rib {
                        inet6.3;
                    }
                }
            }
            family inet6-vpn {
                unicast;
            }
            family evpn {
                signaling;
            }
            export [ PS-PPPOE-SUBSv6 PS-DHCP-SUBSv6 ];
            bfd-liveness-detection {
                minimum-interval 100;
                multiplier 3;
            }
            neighbor 192.168.0.11;
        }
    }
    isis {
        interface ae0.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
            }
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface ae1.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
            }
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface lo0.0 {
            passive;
        }
        source-packet-routing explicit-null;
        level 2 wide-metrics-only;
        level 1 disable;
        spf-options {
            microloop-avoidance {
                post-convergence-path {
                    delay 5000;
                }
            }
            multipath {
                weighted one-hop;
            }
        }
        backup-spf-options {
            use-post-convergence-lfa maximum-labels 5;
            use-source-packet-routing;
        }
        traffic-engineering {
            l3-unicast-topology;
            advertisement always;
        }
        export PS-ISIS-EXPORT;
    }
    mpls {
        label-range {
            srgb-label-range 800000 890000;
        }
        ipv6-tunneling;
    }
}





