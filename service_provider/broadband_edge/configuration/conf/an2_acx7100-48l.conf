policy-options {
    policy-statement PS-ISIS-EXPORT {
        term OOB-MGMT {
            from interface [ em0.0 fxp0.0 re0:mgmt-0.0 ];
            then reject;
        }
        term LOCAL-LOOPBACK-IPV4 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 192.168.0.1/32 exact;
            }
            then {
                prefix-segment {
                    index 1001;
                    node-segment;
                }
                accept;
            }
        }
        term LOCAL-LOOPBACK-IPV6 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 2001:db8::192:168:0:1/128 exact;
            }
            then {
                prefix-segment {
                    index 4001;
                    node-segment;
                }
                accept;
            }
        }
    }
    policy-statement PS-PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
}
routing-instances {
    METRO_BBE_EVPN_FXC_IPoE-GROUP_1 {
        instance-type evpn-vpws;
        protocols {
            evpn {
                label-allocation per-instance;
                flexible-cross-connect-vlan-unaware;
                group fxc {
                    esi {
                        00:15:15:15:00:00:00:15:15:15;
                    }
                    interface ae0.1065;
                    interface ae0.1066;
