/*
 * Topic:   EVPN-VPWS routing-instance (MEF E-Line)
 * Source:  an1_mx204.conf, routing-instances { evpn_group_30_2400 }
 *
 * Highlights:
 *  - instance-type evpn-vpws
 *  - Single attachment-circuit (ae11.2400) with vpws-service-id local/remote
 *    pair (1 / 2) — the EVPN-VPWS service identifier exchanged via
 *    EVPN Type-1 routes
 *  - Per-instance route-distinguisher and vrf-target define the VPN scope
 *  - The matching attachment-circuit interface (vlan-ccc encap, ESI for
 *    multihoming) lives in interfaces/lag-esi-multihoming__an1-mx204.conf
 *
 * Pair with:
 *  - transport/bgp-overlay__an1-mx204.conf (family evpn signaling)
 *  - interfaces/lag-esi-multihoming__an1-mx204.conf
 */
routing-instances {
    evpn_group_30_2400 {
        instance-type evpn-vpws;
        protocols {
            evpn {
                interface ae11.2400 {
                    vpws-service-id {
                        local 1;
                        remote 2;
                    }
                }
            }
        }
        interface ae11.2400;
        route-distinguisher 1.1.0.0:2400;
        vrf-target target:63535:2400;
    }
}
