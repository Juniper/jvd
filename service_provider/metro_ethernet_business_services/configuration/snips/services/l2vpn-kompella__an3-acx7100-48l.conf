/*
 * Topic:   BGP-signalled L2VPN (Kompella) routing-instance, port-based
 * Source:  an3_acx7100-48l.conf, routing-instances { L2VPN_PORT_BASED }
 *
 * Highlights:
 *  - instance-type l2vpn  → BGP-signalled (Kompella) draft-Kompella PW
 *  - Single attachment-circuit (et-0/0/8.0) on the local site (1102),
 *    cross-connected to remote-site-id 1119 on a peer PE
 *  - encapsulation-type ethernet (port-based — entire interface is the AC)
 *  - no-control-word matches the remote PE
 *  - vrf-target establishes the BGP route-target community for the L2VPN
 *
 * Pair with:
 *  - transport/bgp-overlay__an1-mx204.conf (family l2vpn signaling)
 *  - apply-groups/gr-fatpw-label__an3-acx7100-48l.conf (matches L2VPN_PORT_BASED)
 */
routing-instances {
    L2VPN_PORT_BASED {
        instance-type l2vpn;
        protocols {
            l2vpn {
                site r2 {
                    interface et-0/0/8.0 {
                        remote-site-id 1119;
                    }
                    site-identifier 1102;
                }
                encapsulation-type ethernet;
                no-control-word;
            }
        }
        interface et-0/0/8.0;
        route-distinguisher 63535:6500;
        vrf-target target:63535:6500;
    }
}
