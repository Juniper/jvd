/*
 * Topic:   L3VPN routing-instance (vrf) with PE-CE BGP
 * Source:  an3_acx7100-48l.conf, routing-instances { METRO_BGPv4_L3VPN_2101 }
 *
 * Highlights:
 *  - instance-type vrf
 *  - PE-CE BGP session: eBGP (peer-as 64514 vs local 63535) with
 *    as-override so customer routes don't see the provider AS twice
 *  - Per-VRF route-distinguisher (63535:2101) keeps overlapping customer
 *    prefixes unique inside the BGP-VPN tables
 *  - Per-direction policies (PS-…-IMPORT / -EXPORT) — see
 *    policy/l3vpn-export-import__an3-acx7100-48l.conf for the policy text
 *  - vrf-table-label provided by apply-group GR-L3VPN
 *    (see apply-groups/gr-l3vpn__an3-acx7100-48l.conf)
 *
 * Pair with:
 *  - apply-groups/gr-l3vpn__an3-acx7100-48l.conf
 *  - policy/l3vpn-export-import__an3-acx7100-48l.conf
 *  - transport/bgp-overlay__an1-mx204.conf (family inet-vpn)
 */
routing-instances {
    METRO_BGPv4_L3VPN_2101 {
        instance-type vrf;
        routing-options {
            router-id 1.1.0.2;
        }
        protocols {
            bgp {
                group v4Ixia {
                    family inet {
                        any;
                    }
                    neighbor 13.2.0.2 {
                        local-address 13.2.0.1;
                        peer-as 64514;
                        as-override;
                    }
                }
            }
        }
        interface et-0/0/4.2101;
        route-distinguisher 63535:2101;
        vrf-import PS-METRO_BGPv4_L3VPN_2101-IMPORT;
        vrf-export PS-METRO_BGPv4_L3VPN_2101-EXPORT;
        vrf-table-label;
    }
}
