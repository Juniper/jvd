/*
 * Apply-group: GR-ISIS-BCP
 * Source: an1_mx204.conf
 *
 * Best-current-practice ISIS knobs applied to the protocols { isis }
 * stanza. Tunes hello sizes for jumbo links, SPF timers, and
 * overload-on-startup behaviour for graceful insertion.
 */
groups {
    GR-ISIS-BCP {
        protocols {
            isis {
                interface <ae*> {
                    max-hello-size 9106;
                    lsp-interval 10;
                }
                interface <et-*> {
                    max-hello-size 9106;
                    lsp-interval 10;
                }
                spf-options {
                    delay 50;
                    holddown 2000;
                    rapid-runs 5;
                }
                overload {
                    timeout 300;
                }
            }
        }
    }
}
