            term medium_class {
                from {
                    learn-vlan-1p-priority [ 3 2 ];
                }
                then {
                    three-color-policer {
                        two-rate medium_policer;
                    }
                    count class_medium;
                }
            }
            term low_class {
                from {
                    learn-vlan-1p-priority [ 0 1 ];
                }
                then {
                    three-color-policer {
                        two-rate low_policer;
                    }
                    count class_low;
                }
            }
            term default {
                then {
                    three-color-policer {
                        two-rate high_policer;
                    }
                    count default;
                }
            }
        }
    }
    three-color-policer high_policer {
        action {
            loss-priority high then discard;
