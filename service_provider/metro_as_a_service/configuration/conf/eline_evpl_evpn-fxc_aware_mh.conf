            encapsulation vlan-ccc;
            vlan-id 4001;
            input-vlan-map {
                push;
                vlan-id 3000;
            }
            output-vlan-map pop;
            esi {
                00:10:44:11:50:12:01:00:00:00;
                all-active;
            }
