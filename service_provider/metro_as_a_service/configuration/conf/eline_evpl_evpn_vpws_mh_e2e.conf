                    learn-vlan-1p-priority [ 0 1 ];
                }
                then {
                    three-color-policer {
                        two-rate low_policer;
                    }
                    count class_low;
                }
            }
            term default {
                then {
                    three-color-policer {
                        two-rate high_policer;
                    }
                    count default;
                }
            }
        }
    }
