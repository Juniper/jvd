/*
 * Topic:
 *   Class-of-service: schedulers legacy acx (MEF E-LAN / EVP-LAN, E-Line / EVPL)
 *
 * Seen on:
 *   Junos: AN2 (ACX5448), AN4 (ACX710)
 *
 * Highlights:
 *   - Per-queue scheduler shaping / buffer / priority
 *
 * Pair with (same-device dependencies):
 *   (none derived)
 *
 * Variables:
 *   (none)
 */
schedulers {
    SC-SIGNALING {
        shaping-rate percent 5;
        buffer-size percent 5;
        priority low;
    }
    SC-LLQ {
        shaping-rate percent 40;
        buffer-size percent 10;
        priority strict-high;
    }
    SC-REALTIME {
        shaping-rate percent 30;
        buffer-size percent 20;
        priority low;
    }
    SC-HIGH {
        transmit-rate percent 40;
        buffer-size percent 30;
        priority low;
    }
    SC-CONTROL {
        shaping-rate percent 5;
        buffer-size percent 5;
        priority low;
    }
    SC-MEDIUM {
        transmit-rate percent 30;
        buffer-size percent 20;
        priority low;
    }
    SC-LOW {
        transmit-rate percent 20;
        buffer-size percent 10;
        priority low;
    }
    SC-BEST-EFFORT {
        transmit-rate {
            remainder;
        }
        buffer-size {
            remainder;
        }
        priority low;
    }
}
