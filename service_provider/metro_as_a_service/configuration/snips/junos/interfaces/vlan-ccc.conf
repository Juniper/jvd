/*
 * Topic:
 *   Interface: vlan ccc (MEF E-Line / EVPL)
 *
 * Seen on:
 *   Junos: MSE1 (MX304)
 *
 * Highlights:
 *   - encapsulation flexible-ethernet-services
 *
 * Pair with (same-device dependencies):
 *   (none derived)
 *
 * Variables:
 *   $AC_INTF  e.g. xe-0/0/13:2
 *   $UNIT_1   e.g. 4007
 *   $UNIT_2   e.g. 4008
 *   $VLAN_1   e.g. 4007
 *   $VLAN_2   e.g. 4008
 */
interfaces {
    $AC_INTF {
        flexible-vlan-tagging;
        encapsulation flexible-ethernet-services;
        unit $UNIT_1 {
            encapsulation vlan-ccc;
            vlan-id $VLAN_1;
            family ccc {
                filter {
                    input f_vlan_based_fam_bridge;
                }
            }
        }
        unit $UNIT_2 {
            encapsulation vlan-ccc;
            vlan-id $VLAN_2;
            family ccc {
                filter {
                    input f_vlan_based_fam_bridge;
                }
            }
        }
    }
}
