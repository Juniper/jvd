/*
 * Topic:
 *   Interface: irb l3 (MEF E-LAN / EVP-LAN)
 *
 * Seen on:
 *   Junos: MSE1 (MX304)
 *
 * Highlights:
 *   - IRB unit for L3 termination
 *
 * Pair with (same-device dependencies):
 *   (none derived)
 *
 * Variables:
 *   $IP_ADDRESS  e.g. 192.0.2.1/27
 *   $UNIT        e.g. 4075
 */
irb {
    unit $UNIT {
        family inet {
            address $IP_ADDRESS;
        }
    }
}
