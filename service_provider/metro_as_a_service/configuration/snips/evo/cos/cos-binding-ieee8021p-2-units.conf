/*
 * Topic:   Class-of-service: cos binding ieee8021p 2 units (MEF E-Line / EVPL)
 *
 * Seen on:
 *   Evo: AN3 (ACX7100-48L)
 *
 * Highlights:
 *   - L2 CE-facing CoS binding (classify + rewrite IEEE 802.1p)
 *   - EVPN-FXC: binds both bundled VLAN units on the one UNI port
 *
 * Pair with (same-device dependencies):
 *   - evo/cos/classifiers.conf
 *   - evo/cos/forwarding-classes.conf
 *   - evo/cos/rewrite-rules.conf
 *   - evo/cos/scheduler-map.conf
 *   - evo/cos/schedulers.conf
 *   - evo/interfaces/vlan-ccc-2-units.conf
 *   - evo/services/evpn-fxc-vlan-unaware.conf
 *
 * Variables:
 *   $AC_INTF  e.g. et-0/0/13
 *   $UNIT_1   e.g. 4007
 *   $UNIT_2   e.g. 4008
 */
interfaces {
    $AC_INTF {
        scheduler-map SM-5G-SCHEDULER;
        unit $UNIT_1 {
            classifiers {
                ieee-802.1 CL-8021P;
            }
            rewrite-rules {
                ieee-802.1 RR-8021P;
            }
        }
        unit $UNIT_2 {
            classifiers {
                ieee-802.1 CL-8021P;
            }
            rewrite-rules {
                ieee-802.1 RR-8021P;
            }
        }
    }
}
