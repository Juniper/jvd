/*
 * Topic:   Interface: irb l3 (MEF E-LAN / EVP-LAN)
 *
 * Seen on:
 *   Evo: AN3 (ACX7100-48L)
 *
 * Highlights:
 *   - IRB unit for L3 termination
 *
 * Pair with (same-device dependencies):
 *   (none derived)
 *
 * Variables:
 *   $IP_ADDRESS  e.g. 203.0.113.1/27
 *   $MAC         e.g. 00:01:33:44:11:12
 *   $UNIT        e.g. 4075
 */
irb {
    unit $UNIT {
        family inet {
            address $IP_ADDRESS;
        }
        mac $MAC;
    }
}
