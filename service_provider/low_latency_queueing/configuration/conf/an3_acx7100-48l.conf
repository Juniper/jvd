policy-options {
    policy-statement ALLOW_LOOPBACK {
        from {
            route-filter 0.0.0.0/32 orlonger;
        }
        then accept;
    }
    policy-statement PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V4 {
        term t1 {
            from {
                route-filter 192.168.10.2/32 exact;
            }
            then {
                prefix-segment {
                    index 204;
                }
                accept;
            }
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V6 {
        term t1 {
            from {
                family inet6;
                route-filter 2001:db8::1:1:10:2/128 exact;
            }
            then {
                prefix-segment {
                    index 304;
                }
                accept;
            }
        }
    }
    policy-statement nhs_commu_out {
        term SET-REGION {
            then {
                community add FRONTHAUL;
                next term;
            }
        }
        term term2 {
            from {
                family evpn;
                protocol bgp;
            }
            then accept;
        }
        term nhs {
            then {
                next-hop self;
                load-balance per-packet;
                accept;
            }
        }
    }
    community FRONTHAUL members 65535:200;
}
