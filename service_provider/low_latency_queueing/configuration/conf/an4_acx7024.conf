        }
    }
    ldp {
        interface lo0.0;
    }
    mpls {
        lsp-external-controller pccd;
        log-updown {
            syslog;
            trap;
        }
        no-propagate-ttl;
        icmp-tunneling;
        optimize-timer 180;
        ipv6-tunneling;
        interface lo0.0;
        interface ae22.0;
        interface ae25.0;
        interface et-0/0/1.0;
        interface et-0/0/0.0;
    }
    l2-learning {
        global-mac-table-aging-time 10000;
    }
}





