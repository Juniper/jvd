            }
        }
        unit 0 {
            family inet {
                address 10.10.0.29/30;
            }
            family iso;
            family inet6 {
                address 2001:db8::10:10:0:1d/126;
            }
            family mpls {
                maximum-labels 5;
            }
        }
    }
    ae12 {
        description To-CR2;
        mtu 9190;
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
            }
        }
        unit 0 {
            family inet {
                address 10.10.0.33/30;
            }
            family iso;
            family inet6 {
                address 2001:db8::10:10:0:21/126;
            }
            family mpls {
                maximum-labels 5;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.1.7/32 {
                    primary;
                }
                address 192.168.10.7/32;
            }
            family iso {
                address 49.1022.1001.0000.0012.00;
            }
            family inet6 {
                address 2001:db8::1:1:0:7/128 {
                    primary;
                }
                address 2001:db8::1:1:10:7/128;
            }
            family mpls;
        }
    }
}
policy-options {
    policy-statement PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V4 {
        term t1 {
            from {
                route-filter 192.168.10.7/32 exact;
            }
            then {
                prefix-segment {
                    index 212;
                }
                accept;
            }
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V6 {
        term t1 {
            from {
                family inet6;
                route-filter 2001:db8::1:1:10:7/128 exact;
            }
            then {
                prefix-segment {
                    index 312;
                }
                accept;
            }
        }
    }
    policy-statement ospf_summary_reject {
        term t1 {
            from {
                route-filter 192.168.1.9/32 orlonger;
            }
            then accept;
        }
        term t2 {
            then reject;
        }
    }
}
