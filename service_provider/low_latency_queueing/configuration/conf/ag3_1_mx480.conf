routing-options {
    auto-bandwidth {
        template {
            auto_bw_temp1 {
                adjust-interval 900;
                adjust-threshold 50;
                statistic-collection-interval 60;
                auto-bandwidth-subscription 100;
            }
        }
    }
    router-id 192.168.1.7;
    autonomous-system 63535;
    forwarding-table {
        export PPLB;
        chained-composite-next-hop {
            ingress {
                l2ckt;
                evpn;
                l3vpn;
            }
        }
    }
}
protocols {
    isis {
        interface ae8.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface ae11.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface ae12.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface lo0.0 {
            passive;
        }
        source-packet-routing {
            srgb start-label 16000 index-range 80000;
            node-segment {
                ipv4-index 12;
                ipv6-index 112;
            }
            explicit-null;
        }
        level 2 wide-metrics-only;
        spf-options {
            delay 100;
            rapid-runs 5;
        }
        backup-spf-options {
            use-post-convergence-lfa maximum-labels 5;
            use-source-packet-routing;
        }
        export [ SR_NONZERO_LOOPBACKS_V4 SR_NONZERO_LOOPBACKS_V6 ];
        ignore-attached-bit;
    }
    mpls {
        lsp-external-controller pccd;
        log-updown {
            syslog;
            trap;
        }
        no-propagate-ttl;
        icmp-tunneling;
        optimize-timer 180;
        ipv6-tunneling;
        interface lo0.0;
        interface ae8.0;
        interface ae11.0;
        interface ae12.0;
    }
}




