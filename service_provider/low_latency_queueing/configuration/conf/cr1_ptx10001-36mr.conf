policy-options {
    prefix-list MBH-REGION {
        192.168.1.9/32;
        192.168.1.10/32;
        192.168.1.11/32;
    }
    policy-statement ALLOW_LOOPBACK {
        from {
            route-filter 0.0.0.0/32 orlonger;
        }
        then accept;
    }
    policy-statement PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V4 {
        term t1 {
            from {
                route-filter 192.168.10.9/32 exact;
            }
            then {
                prefix-segment {
                    index 214;
                }
                accept;
            }
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V6 {
        term t1 {
            from {
                family inet6;
                route-filter 2001:db8::1:1:10:9/128 exact;
            }
            then {
                prefix-segment {
                    index 314;
                }
                accept;
            }
        }
    }
    policy-statement as3536-out {
        term LOOP_PREVENT {
            from community FRONTHAUL;
            then reject;
        }
        term FROM-SAG {
            from community SERVICE-EDGE;
            then {
                next-hop self;
                accept;
            }
        }
        term loopbacks {
            from {
                prefix-list MBH-REGION;
            }
            then {
                community add xHAUL;
                accept;
            }
        }
        term REJECT {
            then reject;
        }
    }
    policy-statement as63536-in {
        term SAG-ALLOW {
            from community SERVICE-EDGE;
            then accept;
        }
        term reject {
            then reject;
        }
    }
    policy-statement bgp-export {
        term 1 {
            from rib inet.3;
            then reject;
        }
    }
    policy-statement next-hop-self {
        then {
            next-hop self;
            accept;
        }
    }
    community FRONTHAUL members 65535:200;
    community SERVICE-EDGE members 63536:100;
    community xHAUL members 65535:100;
}
