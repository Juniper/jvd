routing-options {
    auto-bandwidth {
        template {
            auto_bw_temp1 {
                adjust-interval 900;
                adjust-threshold 50;
                statistic-collection-interval 60;
                auto-bandwidth-subscription 100;
            }
        }
    }
    router-id 192.168.1.9;
    autonomous-system 63535;
    rib-groups {
        inet3-to-inet0 {
            import-rib [ inet.3 inet.0 inet6.3 ];
            import-policy ALLOW_LOOPBACK;
        }
    }
    forwarding-table {
        export PPLB;
        chained-composite-next-hop {
            ingress {
                l2ckt;
                evpn;
                l3vpn;
            }
        }
    }
}
protocols {
    bgp {
        group ibgp_meg_rr {
            type internal;
            local-address 192.168.1.9;
            family inet {
                labeled-unicast {
                    rib-group inet3-to-inet0;
                    rib {
                        inet.3;
                    }
                }
            }
            family inet6 {
                labeled-unicast {
                    rib {
                        inet6.3;
                    }
                }
            }
            export as3536-out;
            cluster 192.168.1.9;
            neighbor 192.168.1.3;
            neighbor 192.168.1.4;
        }
        group ibgp_cr {
            type internal;
            local-address 192.168.1.9;
            family inet {
                labeled-unicast {
                    rib-group inet3-to-inet0;
                    rib {
                        inet.3;
                    }
                }
                unicast;
            }
            family inet6 {
                labeled-unicast {
                    rib {
                        inet6.3;
                    }
                }
            }
            export next-hop-self;
            neighbor 192.168.1.10;
        }
        group ebgp_sag {
            type external;
            multihop;
            import as63536-in;
            family inet {
                labeled-unicast {
                    rib-group inet3-to-inet0;
                    rib {
                        inet.3;
                    }
                }
            }
            family inet6 {
                labeled-unicast {
                    rib {
                        inet6.3;
                    }
                }
            }
            family route-target;
            export [ next-hop-self bgp-export ];
            peer-as 63536;
            neighbor 10.10.0.50;
        }
        log-updown;
        multipath;
    }
    isis {
        interface ae11.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface ae13.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface ae15.0 {
            level 2 {
                post-convergence-lfa {
                    node-protection cost 16777214;
                }
                metric 10;
            }
            level 1 disable;
            point-to-point;
            family inet {
                bfd-liveness-detection {
                    minimum-interval 100;
                    multiplier 3;
                    no-adaptation;
                }
            }
        }
        interface lo0.0 {
            passive;
        }
        source-packet-routing {
            srgb start-label 16000 index-range 80000;
            node-segment {
                ipv4-index 14;
                ipv6-index 114;
            }
            explicit-null;
        }
        level 2 wide-metrics-only;
        spf-options {
            delay 100;
            rapid-runs 5;
        }
        backup-spf-options {
            use-post-convergence-lfa maximum-labels 5;
            use-source-packet-routing;
        }
        export [ SR_NONZERO_LOOPBACKS_V4 SR_NONZERO_LOOPBACKS_V6 ];
        ignore-attached-bit;
    }
    mpls {
        lsp-external-controller pccd;
        log-updown {
            syslog;
            trap;
        }
        no-propagate-ttl;
        icmp-tunneling;
        optimize-timer 180;
        ipv6-tunneling;
        interface lo0.0;
        interface ae1.0;
        interface ae13.0;
        interface ae15.0;
        interface ae16.0;
    }
}




