policy-options {
    policy-statement ALLOW_LOOPBACK {
        from {
            route-filter 0.0.0.0/32 orlonger;
        }
        then accept;
    }
    policy-statement DO-NOT-READVERTISE-EVPN-ROUTES {
        term 1 {
            from {
                family evpn;
                protocol bgp;
            }
            then reject;
        }
    }
    policy-statement PPLB {
        then {
            load-balance per-packet;
            accept;
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V4 {
        term t1 {
            from {
                route-filter 192.168.10.3/32 exact;
            }
            then {
                prefix-segment {
                    index 208;
                }
                accept;
            }
        }
    }
    policy-statement SR_NONZERO_LOOPBACKS_V6 {
        term t1 {
            from {
                family inet6;
                route-filter 2001:db8::1:1:10:3/128 exact;
            }
            then {
                prefix-segment {
                    index 308;
                }
                accept;
            }
        }
    }
    policy-statement next-hop-self {
        then {
            next-hop self;
            accept;
        }
    }
    policy-statement nhs {
        term 1 {
            from {
                family evpn;
                protocol bgp;
            }
            then accept;
        }
        term nhs {
            then {
                next-hop self;
                accept;
            }
        }
    }
    policy-statement ospf_summary_reject {
        term t1 {
            from {
                route-filter 192.168.1.5/32 orlonger;
            }
            then accept;
        }
        term t2 {
            then reject;
        }
    }
}
