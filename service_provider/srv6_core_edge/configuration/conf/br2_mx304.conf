policy-options {
    policy-statement PS-EBGP-IMP {
        term TR-REGION-0-LOOPBACK-SUMMARY {
            from {
                rib inet6.0;
                community CM-LOOPBACK-65000;
            }
            then {
                preference 160;
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        term TR-REGION-0-LOCATORS {
            from rib inet6.0;
            then {
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        then accept;
    }
    policy-statement PS-EBGP-NHS {
        term TR-REMOTE {
            from tag 65001;
            then {
                community add CM-TEST1;
                next policy;
            }
        }
        term TR-LOCAL {
            then {
                community add CM-TEST2;
                next-hop 2001:db8:bad:cafe::1000:36;
            }
        }
    }
    policy-statement PS-EBGP-SRV6-EXP {
        term TR-LOOPBACK-SUMMARY {
            from {
                protocol aggregate;
                tag 202;
                tag2 0;
            }
            then {
                community add CM-LOOPBACK-65001;
                next-hop self;
                accept;
            }
        }
        term TR-LOCATORS {
            from {
                route-filter 5f00::/24 prefix-length-range /48-/48;
            }
            then accept;
        }
        term TR-RTC {
            from rib bgp.rtarget.0;
            then accept;
        }
        term TR-L3VPN {
            from community RT-SRV6;
            then accept;
        }
    }
    policy-statement PS-IBGP-SRV6-IMP {
        then {
            tag 65001;
        }
    }
    policy-statement PS-ISIS-EXPORT {
        term TR-OOB-MANAGEMENT {
            from interface [ em0.0 fxp0.0 re0:mgmt-0.0 ];
            then reject;
        }
        term TR-LOCAL-LOOPBACK-IPV4 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 100.0.0.18/32 exact;
            }
            then {
                tag 102;
                prefix-segment {
                    algorithm 131 index 118 node-segment;
                    algorithm 132 index 218 node-segment;
                    algorithm 133 index 318 node-segment;
                    index 18;
                    node-segment;
                }
                accept;
            }
        }
        term TR-LOCAL-LOOPBACK-IPV6 {
            from {
                family inet6;
                protocol direct;
                interface lo0.0;
            }
            then {
                tag 102;
                accept;
            }
        }
        term TR-DIRECT-ROUTES-IPV4 {
            from {
                protocol direct;
                route-filter 20.0.0.0/24 prefix-length-range /31-/31;
                route-filter 20.0.0.0/16 upto /24;
            }
            then {
                tag 103;
                accept;
            }
        }
        inactive: term TR-DIRECT-ROUTES-IPV6 {
            from {
                family inet6;
                protocol direct;
                route-filter 2001:db8:beef::1000:0:0/96 prefix-length-range /120-/120;
            }
            then {
                tag 103;
                accept;
            }
        }
        term TR-CORE-SUMMARY {
            from {
                protocol aggregate;
                tag [ 201 202 203 ];
                tag2 1000;
            }
            then reject;
        }
        term TR-ACCESS-SUMMARY {
            from {
                protocol aggregate;
                tag [ 202 203 ];
            }
            then accept;
        }
        term TR-REGION-0-LOOPBACK-SUMMARY-IPV6 {
            from {
                family inet6;
                protocol bgp;
                community CM-LOOPBACK-65000;
            }
            then {
                tag 202;
                tag2 0;
                set-down-bit;
                accept;
            }
        }
        term TR-REGION-0-LOCATOR-SUMMARY-IPV6 {
            from {
                family inet6;
                protocol aggregate;
                tag 201;
                tag2 0;
            }
            then {
                advertise-locator;
                set-down-bit;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-ISIS-IMPORT {
        term LOOPED {
            from tag2 9999;
            then {
                preference 19;
            }
        }
        term TR-HIGH {
            from tag 101;
            then {
                priority high;
                accept;
            }
        }
        term TR-HIGH-LOCATORS {
            from {
                route-filter 5f00::/24 prefix-length-range /36-/48;
            }
            then {
                priority high;
                accept;
            }
        }
        term TR-MEDIUM {
            from tag 102;
            then {
                priority medium;
                accept;
            }
        }
        term LOW {
            then {
                priority low;
                no-backup;
                accept;
            }
        }
    }
    policy-statement PS-LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }
    policy-statement PS-REGION-0-LOCATORS {
        term 1 {
            from {
                route-filter 5f00::/32 prefix-length-range /32-/48;
                route-filter 5f00:a0::/32 prefix-length-range /32-/48;
                route-filter 5f00:b0::/32 prefix-length-range /32-/48;
                route-filter 5f00:d1::/32 prefix-length-range /32-/48;
                route-filter 500f:800::/32 prefix-length-range /32-/48;
            }
            then accept;
        }
        then reject;
    }
    policy-statement PS-VPN-SRV6 {
        term TR-L3VPN-SRV6 {
            from {
                rib bgp.l3vpn.0;
                community RT-SRV6;
            }
            then next policy;
        }
        term TR-L3VPN-MPLS {
            from rib bgp.l3vpn.0;
            then reject;
        }
    }
    community CM-LOOPBACK-65000 members 65000:10000;
    community CM-LOOPBACK-65001 members 65001:10000;
    community CM-NO-ADVERTISE members no-advertise;
    community CM-TEST1 members 65001:1111;
    community CM-TEST2 members 65001:2222;
    community RT-SRV6 members target:65001:*;
