policy-options {
    policy-statement PS-ISIS-EXPORT {
        term TR-OOB-MANAGEMENT {
            from interface [ em0.0 fxp0.0 re0:mgmt-0.0 ];
            then reject;
        }
        term TR-LOCAL-LOOPBACK-IPV4 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 100.0.0.31/32 exact;
            }
            then {
                tag 102;
                prefix-segment {
                    algorithm 131 index 131 node-segment;
                    algorithm 132 index 231 node-segment;
                    algorithm 133 index 331 node-segment;
                    index 31;
                    node-segment;
                }
                accept;
            }
        }
        term TR-LOCAL-LOOPBACK-IPV6 {
            from {
                family inet6;
                protocol direct;
                interface lo0.0;
            }
            then {
                tag 102;
                accept;
            }
        }
        term TR-DIRECT-ROUTES-IPV4 {
            from {
                protocol direct;
                route-filter 20.0.0.0/24 prefix-length-range /31-/31;
            }
            then {
                tag 103;
                accept;
            }
        }
        inactive: term TR-DIRECT-ROUTES-IPV6 {
            from {
                family inet6;
                protocol direct;
                route-filter 2001:db8:beef::1000:0:0/96 prefix-length-range /120-/120;
            }
            then {
                tag 103;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-ISIS-IMPORT {
        term TR-HIGH {
            from tag 101;
            then {
                priority high;
                accept;
            }
        }
        term TR-HIGH-LOCATORS {
            from {
                route-filter 5f00::/24 prefix-length-range /36-/48;
            }
            then {
                priority high;
                accept;
            }
        }
        term TR-MEDIUM {
            from tag 102;
            then {
                priority medium;
                accept;
            }
        }
        term LOW {
            then {
                priority low;
                no-backup;
                accept;
            }
        }
    }
    policy-statement PS-LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }
    policy-statement PS-LOCAL-LOOPBACK {
        term LOCAL-LOOPBACK {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 100.0.0.0/16 prefix-length-range /32-/32;
            }
            then {
                community add CM-LOOPBACK-65001;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-REMOTE-LOOPBACKS {
        term ALL-LOOPBACKS {
            from protocol bgp;
            then {
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-VPN-SRV6 {
        term TR-L3VPN-SRV6 {
            from {
                rib bgp.l3vpn.0;
                community RT-SRV6;
            }
            then accept;
        }
        term TR-L3VPN-MPLS {
            from rib bgp.l3vpn.0;
            then reject;
        }
    }
    community CM-LOOPBACK-65001 members 65001:10000;
    community CM-NO-ADVERTISE members no-advertise;
    community RT-SRV6 members target:65001:*;
}
