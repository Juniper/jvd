    GR-ISIS-IPV6 {
        protocols {
            isis {
                interface <*e*> {
                    level 1 disable;
                    level 2 {
                        srv6-adjacency-segment {
                            unprotected {
                                locator SL-FA-000 {
                                    micro-adjacency-sid;
                                }
                                locator SL-FA-128 {
                                    micro-adjacency-sid;
                                }
                                locator SL-FA-129 {
                                    micro-adjacency-sid;
                                }
                            }
                        }
                        post-convergence-lfa {
                            node-protection cost 16777214;
                        }
                        application-specific {
                            attribute-group LA-FA {
                                advertise-delay-metric;
                                te-metric 1000;
                                application {
                                    flex-algorithm;
                                }
                            }
                        }
                        inactive: hello-authentication-key-chain KC-ISIS;
                    }
                    delay-metric 1000;
                    delay-measurement {
                        probe-interval 1;
                        probe-count 10;
                        advertisement {
                            periodic {
                                threshold 100;
                                interval 30;
                            }
                        }
                    }
                    hello-padding strict;
                    inactive: max-hello-size 9106;
                    inactive: lsp-interval 10;
                    point-to-point;
                }
                interface "<[egx][te]-*>" {
                    family inet6 {
                        bfd-liveness-detection {
                            minimum-interval 50;
                            multiplier 3;
                            no-adaptation;
                        }
                    }
                }
                interface lo0.0 {
                    level 1 disable;
                    passive;
                }
            }
        }
    }
    GR-SRV6 {
        routing-options {
            source-packet-routing {
                srv6 {
                    locator <SL-*> {
                        micro-sid {
                            flavor {
                                psp;
                                usp;
                                usd;
                            }
                        }
                    }
                }
            }
        }
    }
    GR-BGP {
        protocols {
            bgp {
                group <GR-IBGP-*> {
                    type internal;
                    authentication-algorithm ao;
                    authentication-key-chain KC-BGP;
                    multipath;
                    tcp-mss 4096;
                }
            }
        }
    }
