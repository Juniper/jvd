policy-options {
    policy-statement PS-EBGP-IMP {
        term TR-REGION-0-LOOPBACK-SUMMARY {
            from {
                rib inet6.0;
                community CM-LOOPBACK-65000;
            }
            then {
                preference 160;
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        term TR-REGION-0-LOCATORS {
            from rib inet6.0;
            then {
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        then accept;
    }
    policy-statement PS-EBGP-NHS {
        term TR-REMOTE {
            from tag 65001;
            then {
                community add CM-TEST1;
                next policy;
            }
        }
        term TR-LOCAL {
            then {
                community add CM-TEST2;
                next-hop 2001:db8:bad:cafe::1000:36;
            }
        }
    }
    policy-statement PS-EBGP-SRV6-EXP {
        term TR-LOOPBACK-SUMMARY {
            from {
                protocol aggregate;
                tag 202;
                tag2 0;
            }
            then {
                community add CM-LOOPBACK-65001;
                next-hop self;
                accept;
            }
        }
        term TR-LOCATORS {
            from {
                route-filter 5f00::/24 prefix-length-range /48-/48;
            }
            then accept;
        }
        term TR-RTC {
            from rib bgp.rtarget.0;
            then accept;
        }
        term TR-L3VPN {
            from community RT-SRV6;
            then accept;
        }
    }
    policy-statement PS-IBGP-SRV6-IMP {
        then {
            tag 65001;
        }
    }
    policy-statement PS-ISIS-EXPORT {
        term TR-OOB-MANAGEMENT {
            from interface [ em0.0 fxp0.0 re0:mgmt-0.0 ];
            then reject;
        }
        term TR-LOCAL-LOOPBACK-IPV4 {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 100.0.0.36/32 exact;
            }
            then {
                tag 102;
                prefix-segment {
                    algorithm 131 index 136 node-segment;
                    algorithm 132 index 236 node-segment;
                    algorithm 133 index 336 node-segment;
                    index 36;
                    node-segment;
                }
                accept;
            }
        }
        term TR-LOCAL-LOOPBACK-IPV6 {
            from {
                family inet6;
                protocol direct;
                interface lo0.0;
            }
            then {
                tag 102;
                accept;
            }
        }
        term TR-DIRECT-ROUTES-IPV4 {
            from {
                protocol direct;
                route-filter 20.0.0.0/24 prefix-length-range /31-/31;
            }
            then {
                tag 103;
                accept;
            }
        }
        term TR-DIRECT-ROUTES-IPV6 {
            from {
                family inet6;
                protocol direct;
                inactive: route-filter 2001:db8:beef::1000:0:0/96 prefix-length-range /120-/120;
                route-filter 2030:0:0:1::1/126 orlonger;
            }
            then {
                tag 103;
                accept;
            }
        }
        term TR-REGION-0-LOOPBACK-SUMMARY-IPV6 {
            from {
                family inet6;
                protocol bgp;
                community CM-LOOPBACK-65000;
            }
            then {
                tag 202;
                tag2 0;
                set-down-bit;
                accept;
            }
        }
        term TR-REGION-0-LOCATOR-SUMMARY-IPV6 {
            from {
                family inet6;
                protocol aggregate;
                tag 201;
                tag2 0;
            }
            then {
                advertise-locator;
                set-down-bit;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }
    policy-statement PS-LOCAL-LOOPBACK {
        term LOCAL-LOOPBACK {
            from {
                protocol direct;
                interface lo0.0;
                route-filter 100.0.0.0/16 prefix-length-range /32-/32;
            }
            then {
                community add CM-LOOPBACK-65001;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-REGION-0-LOCATORS {
        term 1 {
            from {
                route-filter 5f00::/32 prefix-length-range /32-/48;
                route-filter 5f00:a0::/32 prefix-length-range /32-/48;
                route-filter 5f00:b0::/32 prefix-length-range /32-/48;
            }
            then accept;
        }
        then reject;
    }
    policy-statement PS-REMOTE-LOOPBACKS {
        term ALL-LOOPBACKS {
            from protocol bgp;
            then {
                community add CM-NO-ADVERTISE;
                accept;
            }
        }
        then reject;
    }
    policy-statement PS-VPN-SRV6 {
        term TR-L3VPN-SRV6 {
            from {
                rib bgp.l3vpn.0;
                community RT-SRV6;
            }
            then accept;
        }
        term TR-L3VPN-MPLS {
            from rib bgp.l3vpn.0;
            then reject;
        }
    }
    community CM-LOOPBACK-65000 members 65000:10000;
    community CM-LOOPBACK-65001 members 65001:10000;
    community CM-NO-ADVERTISE members no-advertise;
    community CM-TEST1 members 65001:1111;
    community CM-TEST2 members 65001:2222;
    community RT-SRV6 members target:65001:*;
}
firewall {
    family inet6 {
        filter IPV6 {
            term 1 {
                from {
                    destination-address {
                        5f00:1:36:e001::/128;
                    }
                }
                then {
                    count C-IPv6;
                    accept;
                }
            }
            term 2 {
                then accept;
            }
        }
    }
}
