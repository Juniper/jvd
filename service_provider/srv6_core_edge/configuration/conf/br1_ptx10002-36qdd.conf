        level 1 disable;
        level 2 {
            purge-originator empty;
            inactive: authentication-key-chain KC-ISIS;
            wide-metrics-only;
            prefix-export-limit 3000;
            inactive: max-lsp-size 9106;
        }
        inactive: spf-options {
            microloop-avoidance {
                post-convergence-path {
                    delay 500;
                }
            }
            delay 50;
            holddown 2000;
            rapid-runs 5;
        }
        traceoptions {
            file isis size 500m files 10 world-readable;
            flag error detail;
        }
        backup-spf-options {
            use-post-convergence-lfa {
                maximum-srv6-sids 6;
                maximum-backup-paths 2;
            }
            use-source-packet-routing;
        }
        traffic-engineering {
            l3-unicast-topology;
            ipv6;
            tunnel-source-protocol {
                spring-te;
            }
            advertisement always;
        }
        export PS-ISIS-EXPORT;
        reference-bandwidth 1000g;
        inactive: max-hello-size 9106;
        suppress-attached-bit;
        no-external-export {
            protocol ospf;
            protocol static;
        }
        topologies ipv6-unicast;
        overload {
            timeout 60;
            advertise-high-metrics;
            internal-prefixes;
            external-prefixes;
        }
        dynamic-overload no-overload-on-prefix-export-limit;
        net 49.1000.0000.0000.0036.00;
    }
    lldp {
        port-id-subtype interface-name;
        interface all;
        interface re0:mgmt-0 {
            disable;
        }
    }
