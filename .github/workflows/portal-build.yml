name: Portal build

on:
  pull_request:
    paths:
      - 'portal/**'
      - '.github/workflows/portal-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not "latest") so setup-bun skips the flaky api.github.com
          # tags lookup and downloads the release directly.
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
