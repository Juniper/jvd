name: Markdown link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.lycheeignore'
      - '.github/workflows/link-check.yml'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline = check internal/relative links only; skip all external HTTP(S).
          # External links (e.g. juniper.net docs) are noisy to gate on; we keep
          # this check fast and deterministic by scoping to in-repo paths.
          #
          # --exclude-path skips input files from being scanned. The byoai/ tree
          # is a generated mirror (sync-script artifact); the automation/ READMEs
          # reference a directory layout that no longer exists post-reorganize
          # and need a separate rewrite.
          args: >-
            --offline
            --no-progress
            --include-fragments
            --exclude-path portal/public/byoai
            --exclude-path automation/README.md
            --exclude-path automation/scripts/README.md
            --exclude-path automation/scripts/ags_core/README.md
            './**/*.md'
          fail: true
