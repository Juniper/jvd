    <noscript><h1>Juniper Validated Designs</h1><p>Production-ready reference architectures for data center, WAN, optical, security, and service provider networks. Enable JavaScript for the interactive catalog, config explorer, and generator.</p><ul><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/3stage_dc">3-Stage Data Center</a> — Data center fabric with EVPN/VXLAN ERB overlay and lean spine underlay, Apstra-managed. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/3stage_dc_connected_security">3-Stage DC with Connected Security</a> — Extends the 3-stage DC fabric with SRX firewalls in MNHA, applying policy without breaking VXLAN. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/5stage_evpn_vxlan">5-Stage EVPN-VXLAN</a> — Web-scale data center with lean super spines above multiple PODs — Compute, Storage, and Services. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/collapsed_dc_fabric">Collapsed DC Fabric</a> — Small data center pattern where leaf switches *are* the fabric, peering directly over EVPN/VXLAN — no spines. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/collapsed_dc_fabric_with_access">Collapsed DC Fabric with Access</a> — Collapsed fabric extended with EX-series access switch pairs for high-density mGig access ports. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/evpn_vxlan_dci">EVPN-VXLAN DCI</a> — Three DCI techniques for stretching EVPN/VXLAN across data centers — OTT, Type-2 stitching, and integrated. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/adc/evpn_vxlan_sflow_apstra">EVPN-VXLAN with sFlow &amp; Apstra</a> — sFlow telemetry from every fabric switch into Apstra Flow for real-time, packet-sampled visibility. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/aidc/aiml_multitenancy_backend">AI/ML Multitenancy Backend</a> — Multi-tenant GPU-as-a-Service backend on EVPN/VXLAN — IP-VRF per tenant, rail-optimized stripes. (Data Center)</li><li><a href="https://github.com/Juniper/jvd/tree/main/enterprise_wan/ewan_adv_core_edge">Enterprise WAN: Advanced Core/Edge</a> — EVPN- and MPLS-backed enterprise WAN with secure cross-site connectivity and simplified data sharing. (Enterprise WAN)</li><li><a href="https://github.com/Juniper/jvd/tree/main/enterprise_wan/ewan_core_edge">Enterprise WAN: Core/Edge</a> — Reliable enterprise WAN edge and core connecting branches, campuses, data centers, and public cloud. (Enterprise WAN)</li><li><a href="https://github.com/Juniper/jvd/tree/main/enterprise_wan/ewan_finance">Enterprise WAN: Finance</a> — Enterprise WAN for financial trading — heavy multicast, ultra-low latency, and resilient market data delivery. (Enterprise WAN)</li><li><a href="https://github.com/Juniper/jvd/tree/main/optical/dci_over_ipodwdm">DCI over IPoDWDM</a> — Data center interconnect over IP-over-DWDM — collapsing IP and optical layers for lower cost and complexity. (Optical)</li><li><a href="https://github.com/Juniper/jvd/tree/main/security/scale_out_firewall_nat">Scale-Out Firewall NAT</a> — Connected Security Distributed Services (CSDS) — horizontally scalable firewall and CGNAT capacity. (Security)</li><li><a href="https://github.com/Juniper/jvd/tree/main/security/scale_out_ipsec">Scale-Out IPsec</a> — Connected Security Distributed Services (CSDS) — horizontally scalable IPsec termination at carrier scale. (Security)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/broadband_edge">Broadband Edge</a> — Cloud Metro fabric stitching access, aggregation, and BNG together with Scale-Out CGNAT integration. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/low_latency_queueing">Low Latency Queueing</a> — Low-latency CoS for Metro and 5G xHaul — LLQ, classification, remarking, and measured under-load latency. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/metro_as_a_service">Metro as a Service</a> — First validated end-to-end MEF 3.0-conformant Cloud Metro architecture for Carrier Ethernet services. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/metro_ethernet_business_services">Metro Ethernet Business Services</a> — Cloud Metro fabric with multi-ring core for MEF 3.0 EVPN, VPLS, L2VPN, and L3VPN services. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/port_fan_out">Port Fan-Out</a> — Cost-effective port density via Juniper's port fan-out solution — more ports, less complexity. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/service_provider/srv6_core_edge">SRv6 Core/Edge</a> — Multi-domain SRv6 µSID transport with Flex-Algo and core overlays — L3VPN and EVPN E-Line/VPWS. (Service Provider)</li><li><a href="https://github.com/Juniper/jvd/tree/main/data_center/aidc/aiml_inference_frontend">AI Data Center Frontend Fabric for Inference</a> — Standards-based Ethernet frontend fabric for AI inference workloads with QFX switches, Apstra, and AMD MI300X GPUs. (Data Center)</li></ul></noscript>
