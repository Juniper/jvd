/*
 * Topic:   EVPN-VPWS point-to-point pseudowire (single AC, control-word)
 * Seen on:
 *   Junos: wanedge1_mx304 wanedge2_mx10004
 *   EVO:   wanedge3_acx7509 wanedge4_acx7100-48l
 *
 * Highlights:
 *  - Simplest VPWS: one AC interface, one vpws-service-id pair, control-word enabled
 *  - control-word ensures correct sequencing and prevents fat-pipe reordering issues
 *  - local/remote IDs must be mirror-swapped on the PE peer (local 10 ↔ remote 40)
 *  - Scale: ~1000 simple VPWS instances per WAN edge in this JVD
 *
 * Pair with:
 *  - junos/interfaces/ccc-vpws-mux.conf  (the per-unit AC config on the physical/LAG interface)
 *
 * JVD service mapping:
 *   1800 instances across 4 WAN-edge devices
 *     wanedge1_mx304: 1500
 *     wanedge2_mx10004: 1500
 *     wanedge3_acx7509: 1500
 *     wanedge4_acx7100-48l: 1500
 *   Examples: vfxc_group_40_1001, vfxc_group_40_1003, vfxc_group_40_1005
 *
 * Variables (example values from wanedge1_mx304):
 *   $INSTANCE_NAME      e.g. vpws_group_14_1
 *   $AC_INTF            e.g. xe-0/0/9:0.1
 *   $LOCAL_ID           e.g. 10
 *   $REMOTE_ID          e.g. 40
 *   $RD                 e.g. 2.2.2.2:141
 *   $RT                 e.g. target:63535:141
 */

routing-instances {
    $INSTANCE_NAME {
        instance-type evpn-vpws;
        protocols {
            evpn {
                interface $AC_INTF {
                    vpws-service-id {
                        local $LOCAL_ID;
                        remote $REMOTE_ID;
                    }
                }
                control-word;
            }
        }
        interface $AC_INTF;
        route-distinguisher $RD;
        vrf-target $RT;
    }
}
