/*
 * Topic:   MAC-VRF ELAN bridge domain (L2 multipoint, with optional IRB)
 * Variant: Evolved-OS (EVO)
 * Seen on:
 *   Junos: (none)
 *   EVO:   wanedge3_acx7509 wanedge4_acx7100-48l
 *
 * Highlights:
 *  - EVO equivalent of Junos instance-type evpn; uses instance-type mac-vrf instead
 *  - Two service-type modes shown: vlan-bundle (simple L2) and vlan-based (with IRB gateway)
 *  - vlan-bundle: ACs grouped under a single vlans stanza, no per-VLAN L3
 *  - vlan-based: each VLAN gets explicit vlan-id + l3-interface for IRB routing
 *  - no-control-word is explicit on EVO (Junos omits it when not needed)
 *  - default-gateway do-not-advertise suppresses Type-5 default (bridged+IRB variant only)
 *
 * Pair with:
 *  - evo/services/evpn-vrf-ip-prefix.conf  (the L3 VRF binding irb.$UNIT — vlan-based only)
 *  - evo/interfaces/irb-gateway.conf       (IRB unit config)
 *  - evo/interfaces/ccc-vpws-mux.conf
 *
 * JVD service mapping:
 *   1925 instances across 4 WAN-edge devices
 *     wanedge1_mx304: 1200
 *     wanedge2_mx10004: 1200
 *     wanedge3_acx7509: 1200
 *     wanedge4_acx7100-48l: 1225
 *   Examples: elan_group_500_2001, elan_group_500_2003, elan_group_500_2005
 *
 * Variables (example values from wanedge3_acx7509):
 *   $INSTANCE_NAME      e.g. elan_group_500_2001 / elan_group_95_476
 *   $SERVICE_TYPE       e.g. vlan-bundle / vlan-based
 *   $AC_INTF_1          e.g. ae0.2001
 *   $AC_INTF_2          e.g. ae0.2002
 *   $VLAN_NAME          e.g. mvbundle_2001 / svbased_476
 *   $VLAN_ID            e.g. 476
 *   $IRB_UNIT           e.g. irb.476
 *   $RD                 e.g. 44.44.44.44:2001
 *   $RT                 e.g. target:62525:2001
 */

/* --- Variant A: vlan-bundle (simple L2, no IRB) --- */

routing-instances {
    $INSTANCE_NAME {
        instance-type mac-vrf;
        protocols {
            evpn {
                no-control-word;
            }
        }
        service-type vlan-bundle;
        route-distinguisher $RD;
        vrf-target $RT;
        vlans {
            $VLAN_NAME {
                interface $AC_INTF_1;
                interface $AC_INTF_2;
            }
        }
    }
}

/* --- Variant B: vlan-based (with IRB gateway) --- */

routing-instances {
    $INSTANCE_NAME {
        instance-type mac-vrf;
        protocols {
            evpn {
                encapsulation mpls;
                default-gateway do-not-advertise;
                no-control-word;
            }
        }
        service-type vlan-based;
        route-distinguisher $RD;
        vrf-target $RT;
        vlans {
            $VLAN_NAME {
                vlan-id $VLAN_ID;
                interface $AC_INTF_1;
                l3-interface $IRB_UNIT;
            }
        }
    }
}
