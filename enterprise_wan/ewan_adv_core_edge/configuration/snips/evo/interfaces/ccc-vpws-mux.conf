/*
 * Topic:   VPWS and ELAN attachment-circuit units (vlan-ccc with ESI, vlan-bridge)
 * Variant: Evolved-OS (EVO)
 * Seen on:
 *   Junos: wanedge1_mx304 wanedge2_mx10004
 *   EVO:   wanedge3_acx7509 wanedge4_acx7100-48l
 *
 * Highlights:
 *  - Body is structurally identical to the Junos sibling
 *  - Same ESI format and all-active multi-homing semantics
 *  - EVO uses ether-options { 802.3ad } for member links (vs gigether-options on MX)
 *  - vlan-bridge units on EVO feed mac-vrf instances (not instance-type evpn)
 *
 * Pair with:
 *  - evo/interfaces/lag-flexible-services.conf  (the parent ae interface)
 *  - evo/services/evpn-vpws-simple.conf         (instances binding these vlan-ccc units)
 *  - evo/services/mac-vrf-elan.conf             (instances binding these vlan-bridge units)
 *
 * Variables (example values from wanedge3_acx7509):
 *   $LAG_INTF           e.g. ae0
 *   $UNIT               e.g. 1
 *   $VLAN_ID            e.g. 1
 *   $ESI                e.g. 00:34:34:34:34:34:34:34:11:01
 */

/* --- VPWS AC (vlan-ccc with ESI, multi-homed) --- */

interfaces {
    $LAG_INTF {
        unit $UNIT {
            encapsulation vlan-ccc;
            vlan-id $VLAN_ID;
            esi {
                $ESI;
                all-active;
            }
            family ccc;
        }
    }
}

/* --- ELAN AC (vlan-bridge, no ESI needed for bridge units) --- */

interfaces {
    $LAG_INTF {
        unit $UNIT {
            encapsulation vlan-bridge;
            vlan-id $VLAN_ID;
        }
    }
}
