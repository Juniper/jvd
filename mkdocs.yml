plugins:
- caption-per-book
- search:
    separator: '[\s\-\_]'
- minify:
    minify_html: true
site_author: HPE Juniper JVD Teams
site_name: Juniper Validated Designs - Documentation
theme:
  favicon: images/favicon.ico
  features:
  - toc.follow
  - navigation.top
  - navigation.tabs
  - navigation.instant
  - navigation.footer
  - navigation.indexes
  - search.suggest
  - content.code.annotate
  - content.code.copy
  - content.code.select
  - content.action.edit
  - content.tooltips
  - content.footnote.tooltips
  font:
    code: Nova
    text: Google Sans
  language: en
  logo: images/favicon.ico
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
